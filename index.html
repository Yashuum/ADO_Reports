            height: 6px;
        }

        }

            border-radius: 3px;
        }

        }

            transition: all 0.3s ease;
        }
        
        .upload-zone.dragover {

        }

            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-passed {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .status-failed {

            color: #ef4444;
        }
        
        .status-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        
        .progress-bar {
            height: 8px;
            border-radius: 4px;
            background: #e2e8f0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #0ea5e9, #8b5cf6);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .metric-card {
            position: relative;
            overflow: hidden;
        }
        
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        
        .metric-card.success::before {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        
        .metric-card.danger::before {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        
        .metric-card.warning::before {
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
        }
        
        .metric-card.info::before {
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
        }
        
        .tab-active {
            border-bottom: 2px solid #0ea5e9;
            color: #0ea5e9;
        }
        
        .sidebar-item {
            transition: all 0.2s ease;
        }
        
        .sidebar-item:hover {
            background: rgba(14, 165, 233, 0.1);
        }
        
        .sidebar-item.active {
            background: rgba(14, 165, 233, 0.15);
            border-right: 3px solid #0ea5e9;
        }
        
        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
        
        .tooltip {
            position: relative;
        }
        
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: #1e293b;
            color: white;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }
        
        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
        }

        // ============================================
        // LOG PARSER ENGINE
        // ============================================
        
        const LogParser = {
            patterns: {
                technicalName: /Technical Name\s*[:\-]\s*(.+)/gi,
                transactionId: /Transaction\s*Id\s*[:\-]\s*([A-Za-z0-9\-]+)/gi,
                contextId: /Context\s*Id\s*[:\-]\s*([A-Za-z0-9\-]+)/gi,
                status: /Status\s*[:\-]\s*(PROCESSED|FAILED|PENDING|SUCCESS|ERROR|COMPLETED)/gi,
                passed: /(Transaction\s+In\s+Passed|Test\s+Passed|PASSED|✓|passed)/gi,
                failed: /(Transaction\s+In\s+Failed|Test\s+Failed|FAILED|✗|failed|Error|Exception)/gi,
                retryCount: /(?:Total\s+)?retry\s+count\s*[:\-]\s*(\d+)/gi,
                executionTime: /(?:Execution|Total)\s+(?:Time|Duration)\s*[:\-]\s*([\d.]+)\s*(ms|s|seconds?|milliseconds?)?/gi,
                soapResponse: /Soap\s+Response\s*[:\-]?\s*(.+)/gi,
                httpCode: /HTTP\s*(?:Status|Code|Response)?\s*[:\-]?\s*(\d{3})/gi,
                authFailure: /(401\s+Unauthorized|403\s+Forbidden|Authentication\s+Failed|Auth\s+Error)/gi,
                timeout: /(Timeout|Timed\s+Out|Connection\s+Timeout|Request\s+Timeout)/gi,
                exception: /(Exception|Error|Failure)[\s:\-]+(.+)/gi,
                timestamp: /(\d{4}-\d{2}-\d{2}[T\s]\d{2}:\d{2}:\d{2}(?:\.\d+)?(?:Z|[+-]\d{2}:?\d{2})?)/gi,
                testCase: /(?:Test\s+Case|TestCase|TC)\s*[:\-#]?\s*([A-Za-z0-9_\-]+)/gi,
                module: /(?:Module|Component|Feature)\s*[:\-]\s*(.+)/gi,
                queryName: /(?:Query|Stored\s+Procedure|SP)\s*[:\-]\s*(.+)/gi,
                validationTime: /Validation\s+(?:Time|Duration)\s*[:\-]\s*([\d.]+)\s*(ms|s)?/gi,
                dbValidation: /(?:DB|Database)\s+Validation\s*[:\-]\s*(.+)/gi,
                azurePipeline: /##\[(?:section|command|error|warning)\](.+)/gi,
                vstestResult: /(?:Passed|Failed|Skipped)\s+(\w+)\s+\[(.+)\]/gi,
                jmeterSample: /<httpSample\s+t="(\d+)"\s+.*?s="(true|false)".*?lb="([^"]+)"/gi,
                allureStatus: /"status"\s*:\s*"(passed|failed|broken|skipped)"/gi,
            },
            
            parse(content, fileName) {
                const results = {
                    fileName,
                    fileType: this.detectFileType(fileName),
                    transactions: [],
                    summary: {
                        total: 0,
                        passed: 0,
                        failed: 0,
                        warnings: 0,
                        avgExecutionTime: 0,
                        totalRetries: 0,
                        startTime: null,
                        endTime: null,
                    },
                    errors: [],
                    warnings: [],
                    metadata: {},
                    rawContent: content,
                };
                
                try {
                    switch (results.fileType) {
                        case 'trx':
                            return this.parseTRX(content, results);
                        case 'jtl':
                            return this.parseJTL(content, results);
                        case 'xml':
                            return this.parseXML(content, results);
                        case 'allure':
                            return this.parseAllure(content, results);
                        default:
                            return this.parseLog(content, results);
                    }
                } catch (error) {
                    results.errors.push({
                        type: 'PARSE_ERROR',
                        message: error.message,
                        stack: error.stack,
                    });
                    return results;
                }
            },
            
            detectFileType(fileName) {
                const ext = fileName.toLowerCase().split('.').pop();
                if (ext === 'trx') return 'trx';
                if (ext === 'jtl') return 'jtl';
                if (ext === 'xml') return 'xml';
                if (ext === 'json') return 'allure';
                return 'log';
            },
            
            parseLog(content, results) {
                const lines = content.split('\n');
                let currentTransaction = null;
                const transactions = [];
                
                lines.forEach((line, index) => {
                    // Extract timestamps
                    const timestampMatch = line.match(this.patterns.timestamp);
                    if (timestampMatch) {
                        const ts = new Date(timestampMatch[1]);
                        if (!results.summary.startTime || ts < results.summary.startTime) {
                            results.summary.startTime = ts;
                        }
                        if (!results.summary.endTime || ts > results.summary.endTime) {
                            results.summary.endTime = ts;
                        }
                    }
                    
                    // Detect new transaction
                    const techNameMatch = line.match(/Technical Name\s*[:\-]\s*(.+)/i);
                    if (techNameMatch) {
                        if (currentTransaction) {
                            transactions.push(currentTransaction);
                        }
                        currentTransaction = {
                            id: `TXN-${Date.now()}-${index}`,
                            technicalName: techNameMatch[1].trim(),
                            status: 'UNKNOWN',
                            passed: null,
                            retryCount: 0,
                            executionTime: 0,
                            timestamp: timestampMatch ? new Date(timestampMatch[1]) : new Date(),
                            errors: [],
                            warnings: [],
                            metadata: {},
                            lineNumber: index + 1,
                        };
                    }
                    
                    // Extract transaction details
                    if (currentTransaction) {
                        // Transaction ID
                        const txnIdMatch = line.match(/Transaction\s*Id\s*[:\-]\s*([A-Za-z0-9\-]+)/i);
                        if (txnIdMatch) {
                            currentTransaction.transactionId = txnIdMatch[1];
                        }
                        
                        // Context ID
                        const ctxIdMatch = line.match(/Context\s*Id\s*[:\-]\s*([A-Za-z0-9\-]+)/i);
                        if (ctxIdMatch) {
                            currentTransaction.contextId = ctxIdMatch[1];
                        }
                        
                        // Status
                        const statusMatch = line.match(/Status\s*[:\-]\s*(PROCESSED|FAILED|PENDING|SUCCESS|ERROR|COMPLETED)/i);
                        if (statusMatch) {
                            currentTransaction.status = statusMatch[1].toUpperCase();
                        }
                        
                        // Pass/Fail detection
                        if (line.match(/Transaction\s+In\s+Passed|Test\s+Passed|\bPASSED\b|✓/i)) {
                            currentTransaction.passed = true;
                            currentTransaction.status = 'PASSED';
                        }
                        if (line.match(/Transaction\s+In\s+Failed|Test\s+Failed|\bFAILED\b|✗|Error|Exception/i)) {
                            currentTransaction.passed = false;
                            currentTransaction.status = 'FAILED';
                        }
                        
                        // Retry count
                        const retryMatch = line.match(/(?:Total\s+)?retry\s+count\s*[:\-]\s*(\d+)/i);
                        if (retryMatch) {
                            currentTransaction.retryCount = parseInt(retryMatch[1]);
                        }
                        
                        // Execution time
                        const timeMatch = line.match(/(?:Execution|Total)\s+(?:Time|Duration)\s*[:\-]\s*([\d.]+)\s*(ms|s|seconds?|milliseconds?)?/i);
                        if (timeMatch) {
                            let time = parseFloat(timeMatch[1]);
                            if (timeMatch[2] && timeMatch[2].toLowerCase().startsWith('s')) {
                                time *= 1000;
                            }
                            currentTransaction.executionTime = time;
                        }
                        
                        // HTTP codes
                        const httpMatch = line.match(/HTTP\s*(?:Status|Code|Response)?\s*[:\-]?\s*(\d{3})/i);
                        if (httpMatch) {
                            currentTransaction.httpCode = parseInt(httpMatch[1]);
                            if (currentTransaction.httpCode >= 400) {
                                currentTransaction.errors.push({
                                    type: 'HTTP_ERROR',
                                    code: currentTransaction.httpCode,
                                    message: line.trim(),
                                });
                            }
                        }
                        
                        // Auth failures
                        if (line.match(/401\s+Unauthorized|403\s+Forbidden|Authentication\s+Failed/i)) {
                            currentTransaction.errors.push({
                                type: 'AUTH_FAILURE',
                                message: line.trim(),
                            });
                            currentTransaction.passed = false;
                            currentTransaction.status = 'FAILED';
                        }
                        
                        // Timeouts
                        if (line.match(/Timeout|Timed\s+Out|Connection\s+Timeout/i)) {
                            currentTransaction.errors.push({
                                type: 'TIMEOUT',
                                message: line.trim(),
                            });
                        }
                        
                        // Exceptions
                        const exceptionMatch = line.match(/(Exception|Error)[\s:\-]+(.+)/i);
                        if (exceptionMatch) {
                            currentTransaction.errors.push({
                                type: 'EXCEPTION',
                                name: exceptionMatch[1],
                                message: exceptionMatch[2].trim(),
                            });
                        }
                        
                        // SOAP Response
                        const soapMatch = line.match(/Soap\s+Response\s*[:\-]?\s*(.+)/i);
                        if (soapMatch) {
                            currentTransaction.metadata.soapResponse = soapMatch[1].trim();
                        }
                        
                        // Query names
                        const queryMatch = line.match(/(?:Query|Stored\s+Procedure|SP)\s*[:\-]\s*(.+)/i);
                        if (queryMatch) {
                            currentTransaction.metadata.queryName = queryMatch[1].trim();
                        }
                        
                        // Validation time
                        const validationMatch = line.match(/Validation\s+(?:Time|Duration)\s*[:\-]\s*([\d.]+)\s*(ms|s)?/i);
                        if (validationMatch) {
                            let time = parseFloat(validationMatch[1]);
                            if (validationMatch[2] && validationMatch[2].toLowerCase() === 's') {
                                time *= 1000;
                            }
                            currentTransaction.metadata.validationTime = time;
                        }
                        
                        // Module
                        const moduleMatch = line.match(/(?:Module|Component|Feature)\s*[:\-]\s*(.+)/i);
                        if (moduleMatch) {
                            currentTransaction.module = moduleMatch[1].trim();
                        }
                    }
                    
                    // Azure DevOps specific patterns
                    const azureMatch = line.match(/##\[(?:section|command|error|warning)\](.+)/);
                    if (azureMatch) {
                        results.metadata.isAzureDevOps = true;
                        if (line.includes('##[error]')) {
                            results.errors.push({
                                type: 'AZURE_PIPELINE_ERROR',
                                message: azureMatch[1],
                                lineNumber: index + 1,
                            });
                        }
                    }
                    
                    // VSTest results
                    const vstestMatch = line.match(/(?:Passed|Failed|Skipped)\s+(\w+)\s+\[(.+)\]/);
                    if (vstestMatch) {
                        results.metadata.isVSTest = true;
                    }
                });
                
                // Add last transaction
                if (currentTransaction) {
                    transactions.push(currentTransaction);
                }
                
                // If no transactions found, create synthetic ones from patterns
                if (transactions.length === 0) {
                    transactions.push(...this.createSyntheticTransactions(content));
                }
                
                results.transactions = transactions;
                this.calculateSummary(results);
                
                return results;
            },
            
            createSyntheticTransactions(content) {
                const transactions = [];
                const lines = content.split('\n');
                
                lines.forEach((line, index) => {
                    // Look for any pass/fail indicators
                    const passMatch = line.match(/\b(PASSED|SUCCESS|COMPLETED|OK)\b/i);
                    const failMatch = line.match(/\b(FAILED|ERROR|FAILURE|EXCEPTION)\b/i);
                    
                    if (passMatch || failMatch) {
                        transactions.push({
                            id: `SYN-${Date.now()}-${index}`,
                            technicalName: line.substring(0, 50).trim() || `Line ${index + 1}`,
                            status: passMatch ? 'PASSED' : 'FAILED',
                            passed: !!passMatch,
                            retryCount: 0,
                            executionTime: 0,
                            timestamp: new Date(),
                            errors: failMatch ? [{ type: 'DETECTED', message: line.trim() }] : [],
                            warnings: [],
                            metadata: {},
                            lineNumber: index + 1,
                        });
                    }
                });
                
                return transactions;
            },
            
            parseTRX(content, results) {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/xml');
                    
                    const unitTests = doc.querySelectorAll('UnitTestResult');
                    
                    unitTests.forEach((test, index) => {
                        const outcome = test.getAttribute('outcome');
                        const testName = test.getAttribute('testName');
                        const duration = test.getAttribute('duration');
                        const startTime = test.getAttribute('startTime');
                        const endTime = test.getAttribute('endTime');
                        
                        const transaction = {
                            id: test.getAttribute('testId') || `TRX-${index}`,
                            technicalName: testName || `Test ${index + 1}`,
                            status: outcome?.toUpperCase() || 'UNKNOWN',
                            passed: outcome?.toLowerCase() === 'passed',
                            retryCount: 0,
                            executionTime: this.parseDuration(duration),
                            timestamp: startTime ? new Date(startTime) : new Date(),
                            endTime: endTime ? new Date(endTime) : null,
                            errors: [],
                            warnings: [],
                            metadata: {},
                            lineNumber: index + 1,
                        };
                        
                        // Extract error info
                        const errorInfo = test.querySelector('ErrorInfo');
                        if (errorInfo) {
                            const message = errorInfo.querySelector('Message');
                            const stackTrace = errorInfo.querySelector('StackTrace');
                            if (message) {
                                transaction.errors.push({
                                    type: 'TEST_FAILURE',
                                    message: message.textContent,
                                    stackTrace: stackTrace?.textContent,
                                });
                            }
                        }
                        
                        results.transactions.push(transaction);
                    });
                    
                    // Extract test run info
                    const testRun = doc.querySelector('TestRun');
                    if (testRun) {
                        results.metadata.testRunName = testRun.getAttribute('name');
                        results.metadata.runUser = testRun.getAttribute('runUser');
                    }
                    
                    const times = doc.querySelector('Times');
                    if (times) {
                        results.summary.startTime = new Date(times.getAttribute('start'));
                        results.summary.endTime = new Date(times.getAttribute('finish'));
                    }
                    
                } catch (error) {
                    results.errors.push({
                        type: 'TRX_PARSE_ERROR',
                        message: error.message,
                    });
                }
                
                this.calculateSummary(results);
                return results;
            },
            
            parseJTL(content, results) {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/xml');
                    
                    const samples = doc.querySelectorAll('httpSample, sample');
                    
                    samples.forEach((sample, index) => {
                        const success = sample.getAttribute('s') === 'true';
                        const label = sample.getAttribute('lb');
                        const time = parseInt(sample.getAttribute('t')) || 0;
                        const timestamp = parseInt(sample.getAttribute('ts')) || Date.now();
                        const responseCode = sample.getAttribute('rc');
                        const responseMessage = sample.getAttribute('rm');
                        
                        const transaction = {
                            id: `JTL-${index}`,
                            technicalName: label || `Sample ${index + 1}`,
                            status: success ? 'PASSED' : 'FAILED',
                            passed: success,
                            retryCount: 0,
                            executionTime: time,
                            timestamp: new Date(timestamp),
                            httpCode: parseInt(responseCode) || null,
                            errors: [],
                            warnings: [],
                            metadata: {
                                responseMessage,
                                bytes: sample.getAttribute('by'),
                                latency: sample.getAttribute('lt'),
                                connectTime: sample.getAttribute('ct'),
                            },
                            lineNumber: index + 1,
                        };
                        
                        if (!success) {
                            transaction.errors.push({
                                type: 'JMETER_FAILURE',
                                message: responseMessage || 'Request failed',
                                code: responseCode,
                            });
                        }
                        
                        results.transactions.push(transaction);
                    });
                    
                    results.metadata.isJMeter = true;
                    
                } catch (error) {
                    // Try CSV format
                    return this.parseJTLCSV(content, results);
                }
                
                this.calculateSummary(results);
                return results;
            },
            
            parseJTLCSV(content, results) {
                const lines = content.split('\n');
                const headers = lines[0]?.split(',').map(h => h.trim().toLowerCase());
                
                if (!headers) return results;
                
                const timeIdx = headers.indexOf('elapsed') !== -1 ? headers.indexOf('elapsed') : headers.indexOf('t');
                const labelIdx = headers.indexOf('label') !== -1 ? headers.indexOf('label') : headers.indexOf('lb');
                const successIdx = headers.indexOf('success') !== -1 ? headers.indexOf('success') : headers.indexOf('s');
                const timestampIdx = headers.indexOf('timestamp') !== -1 ? headers.indexOf('timestamp') : headers.indexOf('ts');
                const responseCodeIdx = headers.indexOf('responsecode') !== -1 ? headers.indexOf('responsecode') : headers.indexOf('rc');
                
                for (let i = 1; i < lines.length; i++) {
                    const values = lines[i].split(',');
                    if (values.length < 3) continue;
                    
                    const success = values[successIdx]?.toLowerCase() === 'true';
                    
                    results.transactions.push({
                        id: `JTL-CSV-${i}`,
                        technicalName: values[labelIdx] || `Sample ${i}`,
                        status: success ? 'PASSED' : 'FAILED',
                        passed: success,
                        retryCount: 0,
                        executionTime: parseInt(values[timeIdx]) || 0,
                        timestamp: new Date(parseInt(values[timestampIdx]) || Date.now()),
                        httpCode: parseInt(values[responseCodeIdx]) || null,
                        errors: success ? [] : [{ type: 'JMETER_FAILURE', message: 'Request failed' }],
                        warnings: [],
                        metadata: {},
                        lineNumber: i,
                    });
                }
                
                results.metadata.isJMeter = true;
                this.calculateSummary(results);
                return results;
            },
            
            parseXML(content, results) {
                try {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(content, 'text/xml');
                    
                    // Try to detect format
                    const root = doc.documentElement.tagName.toLowerCase();
                    
                    if (root === 'testsuites' || root === 'testsuite') {
                        return this.parseJUnit(doc, results);
                    }
                    
                    // Generic XML parsing
                    const testCases = doc.querySelectorAll('testcase, TestCase, test-case');
                    
                    testCases.forEach((tc, index) => {
                        const name = tc.getAttribute('name') || tc.getAttribute('Name') || `Test ${index + 1}`;
                        const time = parseFloat(tc.getAttribute('time') || tc.getAttribute('Time') || '0');
                        const failure = tc.querySelector('failure, Failure');
                        const error = tc.querySelector('error, Error');
                        const skipped = tc.querySelector('skipped, Skipped');
                        
                        let status = 'PASSED';
                        let passed = true;
                        const errors = [];
                        
                        if (failure) {
                            status = 'FAILED';
                            passed = false;
                            errors.push({
                                type: 'FAILURE',
                                message: failure.getAttribute('message') || failure.textContent,
                            });
                        }
                        if (error) {
                            status = 'ERROR';
                            passed = false;
                            errors.push({
                                type: 'ERROR',
                                message: error.getAttribute('message') || error.textContent,
                            });
                        }
                        if (skipped) {
                            status = 'SKIPPED';
                            passed = null;
                        }
                        
                        results.transactions.push({
                            id: `XML-${index}`,
                            technicalName: name,
                            status,
                            passed,
                            retryCount: 0,
                            executionTime: time * 1000,
                            timestamp: new Date(),
                            errors,
                            warnings: [],
                            metadata: {
                                className: tc.getAttribute('classname') || tc.getAttribute('ClassName'),
                            },
                            lineNumber: index + 1,
                        });
                    });
                    
                } catch (error) {
                    results.errors.push({
                        type: 'XML_PARSE_ERROR',
                        message: error.message,
                    });
                }
                
                this.calculateSummary(results);
                return results;
            },
            
            parseJUnit(doc, results) {
                const testCases = doc.querySelectorAll('testcase');
                
                testCases.forEach((tc, index) => {
                    const name = tc.getAttribute('name');
                    const className = tc.getAttribute('classname');
                    const time = parseFloat(tc.getAttribute('time') || '0');
                    
                    const failure = tc.querySelector('failure');
                    const error = tc.querySelector('error');
                    const skipped = tc.querySelector('skipped');
                    
                    let status = 'PASSED';
                    let passed = true;
                    const errors = [];
                    
                    if (failure) {
                        status = 'FAILED';
                        passed = false;
                        errors.push({
                            type: 'ASSERTION_FAILURE',
                            message: failure.getAttribute('message'),
                            details: failure.textContent,
                        });
                    }
                    if (error) {
                        status = 'ERROR';
                        passed = false;
                        errors.push({
                            type: 'ERROR',
                            message: error.getAttribute('message'),
                            details: error.textContent,
                        });
                    }
                    if (skipped) {
                        status = 'SKIPPED';
                        passed = null;
                    }
                    
                    results.transactions.push({
                        id: `JUNIT-${index}`,
                        technicalName: name,
                        status,
                        passed,
                        retryCount: 0,
                        executionTime: time * 1000,
                        timestamp: new Date(),
                        errors,
                        warnings: [],
                        metadata: {
                            className,
                            fullName: className ? `${className}.${name}` : name,
                        },
                        lineNumber: index + 1,
                    });
                });
                
                // Extract suite info
                const suite = doc.querySelector('testsuite');
                if (suite) {
                    results.metadata.suiteName = suite.getAttribute('name');
                    results.metadata.tests = suite.getAttribute('tests');
                    results.metadata.failures = suite.getAttribute('failures');
                    results.metadata.errors = suite.getAttribute('errors');
                    results.metadata.time = suite.getAttribute('time');
                }
                
                this.calculateSummary(results);
                return results;
            },
            
            parseAllure(content, results) {
                try {
                    const data = JSON.parse(content);
                    
                    // Handle different Allure JSON formats
                    const testResults = Array.isArray(data) ? data : (data.testCases || data.results || [data]);
                    
                    testResults.forEach((test, index) => {
                        const status = (test.status || 'unknown').toUpperCase();
                        const passed = status === 'PASSED';
                        
                        results.transactions.push({
                            id: test.uuid || test.id || `ALLURE-${index}`,
                            technicalName: test.name || test.fullName || `Test ${index + 1}`,
                            status,
                            passed: status === 'PASSED' ? true : (status === 'FAILED' || status === 'BROKEN') ? false : null,
                            retryCount: test.retries || 0,
                            executionTime: test.time?.duration || test.duration || 0,
                            timestamp: test.time?.start ? new Date(test.time.start) : new Date(),
                            errors: [],
                            warnings: [],
                            metadata: {
                                description: test.description,
                                labels: test.labels,
                                links: test.links,
                                attachments: test.attachments,
                                steps: test.steps,
                                parameters: test.parameters,
                            },
                            lineNumber: index + 1,
                        });
                        
                        if (test.statusDetails?.message) {
                            results.transactions[results.transactions.length - 1].errors.push({
                                type: 'ALLURE_FAILURE',
                                message: test.statusDetails.message,
                                trace: test.statusDetails.trace,
                            });
                        }
                    });
                    
                    results.metadata.isAllure = true;
                    
                } catch (error) {
                    results.errors.push({
                        type: 'ALLURE_PARSE_ERROR',
                        message: error.message,
                    });
                }
                
                this.calculateSummary(results);
                return results;
            },
            
            parseDuration(duration) {
                if (!duration) return 0;
                
                // Format: HH:MM:SS.mmm
                const parts = duration.split(':');
                if (parts.length === 3) {
                    const hours = parseInt(parts[0]) || 0;
                    const minutes = parseInt(parts[1]) || 0;
                    const seconds = parseFloat(parts[2]) || 0;
                    return (hours * 3600 + minutes * 60 + seconds) * 1000;
                }
                
                return parseFloat(duration) * 1000 || 0;
            },
            
            calculateSummary(results) {
                const { transactions } = results;
                
                results.summary.total = transactions.length;
                results.summary.passed = transactions.filter(t => t.passed === true).length;
                results.summary.failed = transactions.filter(t => t.passed === false).length;
                results.summary.warnings = transactions.filter(t => t.warnings.length > 0).length;
                
                const executionTimes = transactions.filter(t => t.executionTime > 0).map(t => t.executionTime);
                results.summary.avgExecutionTime = executionTimes.length > 0 
                    ? executionTimes.reduce((a, b) => a + b, 0) / executionTimes.length 
                    : 0;
                
                results.summary.totalRetries = transactions.reduce((sum, t) => sum + (t.retryCount || 0), 0);
                
                results.summary.successRate = results.summary.total > 0 
                    ? (results.summary.passed / results.summary.total) * 100 
                    : 0;
                
                // Calculate time range
                const timestamps = transactions.filter(t => t.timestamp).map(t => new Date(t.timestamp));
                if (timestamps.length > 0) {
                    results.summary.startTime = results.summary.startTime || new Date(Math.min(...timestamps));
                    results.summary.endTime = results.summary.endTime || new Date(Math.max(...timestamps));
                }
            },
        };
        
        // ============================================
        // AI SUMMARY GENERATOR
        // ============================================
        
        const AISummaryGenerator = {
            generate(results) {
                const { summary, transactions, errors } = results;
                const summaries = [];
                
                // Overall execution summary
                const successRate = summary.successRate.toFixed(1);
                const status = successRate >= 95 ? 'successfully' : successRate >= 80 ? 'with some issues' : 'with significant failures';
                
                summaries.push({
                    type: 'executive',
                    title: 'Executive Summary',
                    content: `Test execution completed ${status}. ${summary.passed} of ${summary.total} transactions processed successfully (${successRate}% success rate). ${summary.failed} failures detected. Average processing time was ${this.formatTime(summary.avgExecutionTime)}.`,
                });
                
                // Performance insights
                if (summary.avgExecutionTime > 0) {
                    const slowTransactions = transactions.filter(t => t.executionTime > summary.avgExecutionTime * 2);
                    if (slowTransactions.length > 0) {
                        summaries.push({
                            type: 'performance',
                            title: 'Performance Analysis',
                            content: `${slowTransactions.length} transactions exceeded the average execution time by more than 2x. The slowest transaction was "${slowTransactions[0]?.technicalName}" at ${this.formatTime(slowTransactions[0]?.executionTime)}.`,
                        });
                    }
                }
                
                // Retry analysis
                if (summary.totalRetries > 0) {
                    const retriedTransactions = transactions.filter(t => t.retryCount > 0);
                    summaries.push({
                        type: 'retry',
                        title: 'Retry Analysis',
                        content: `${retriedTransactions.length} transactions required retries with a total of ${summary.totalRetries} retry attempts. This may indicate intermittent failures or environment instability.`,
                    });
                }
                
                // Failure analysis
                if (summary.failed > 0) {
                    const failedTransactions = transactions.filter(t => t.passed === false);
                    const errorTypes = {};
                    
                    failedTransactions.forEach(t => {
                        t.errors.forEach(e => {
                            errorTypes[e.type] = (errorTypes[e.type] || 0) + 1;
                        });
                    });
                    
                    const topErrors = Object.entries(errorTypes)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 3)
                        .map(([type, count]) => `${type} (${count})`)
                        .join(', ');
                    
                    summaries.push({
                        type: 'failure',
                        title: 'Failure Analysis',
                        content: `${summary.failed} transactions failed. Primary error types: ${topErrors || 'Unknown'}. Immediate attention recommended for critical failures.`,
                    });
                }
                
                // RCA suggestions
                const rcaSuggestions = this.generateRCA(results);
                if (rcaSuggestions.length > 0) {
                    summaries.push({
                        type: 'rca',
                        title: 'Root Cause Analysis',
                        content: rcaSuggestions.join(' '),
                    });
                }
                
                // Recommendations
                const recommendations = this.generateRecommendations(results);
                if (recommendations.length > 0) {
                    summaries.push({
                        type: 'recommendations',
                        title: 'Recommendations',
                        content: recommendations.join(' '),
                    });
                }
                
                return summaries;
            },
            
            generateRCA(results) {
                const suggestions = [];
                const { transactions, errors } = results;
                
                // Auth failures
                const authFailures = transactions.filter(t => 
                    t.errors.some(e => e.type === 'AUTH_FAILURE' || e.message?.includes('401') || e.message?.includes('Unauthorized'))
                );
                if (authFailures.length > 0) {
                    suggestions.push(`Authentication failures detected in ${authFailures.length} transactions. Verify credentials, tokens, and KeyVault configurations.`);
                }
                
                // Timeouts
                const timeouts = transactions.filter(t => 
                    t.errors.some(e => e.type === 'TIMEOUT' || e.message?.toLowerCase().includes('timeout'))
                );
                if (timeouts.length > 0) {
                    suggestions.push(`Timeout issues detected in ${timeouts.length} transactions. Consider increasing timeout thresholds or investigating network latency.`);
                }
                
                // High retry counts
                const highRetries = transactions.filter(t => t.retryCount >= 3);
                if (highRetries.length > 0) {
                    suggestions.push(`${highRetries.length} transactions required 3+ retries, indicating potential environment instability or intermittent service issues.`);
                }
                
                // HTTP errors
                const httpErrors = transactions.filter(t => t.httpCode && t.httpCode >= 400);
                if (httpErrors.length > 0) {
                    const errorCodes = [...new Set(httpErrors.map(t => t.httpCode))].join(', ');
                    suggestions.push(`HTTP error codes detected: ${errorCodes}. Review API endpoints and service health.`);
                }
                
                // DB validation issues
                const dbIssues = transactions.filter(t => 
                    t.errors.some(e => e.message?.toLowerCase().includes('database') || e.message?.toLowerCase().includes('sql'))
                );
                if (dbIssues.length > 0) {
                    suggestions.push(`Database-related issues found in ${dbIssues.length} transactions. Verify database connectivity and query performance.`);
                }
                
                return suggestions;
            },
            
            generateRecommendations(results) {
                const recommendations = [];
                const { summary, transactions } = results;
                
                if (summary.successRate < 95) {
                    recommendations.push('Investigate and resolve failing test cases before the next release cycle.');
                }
                
                if (summary.totalRetries > summary.total * 0.1) {
                    recommendations.push('High retry rate suggests environment instability. Consider implementing more robust error handling.');
                }
                
                if (summary.avgExecutionTime > 5000) {
                    recommendations.push('Average execution time exceeds 5 seconds. Optimize slow transactions to improve overall test efficiency.');
                }
                
                const slowestTransactions = [...transactions]
                    .sort((a, b) => b.executionTime - a.executionTime)
                    .slice(0, 3);
                
                if (slowestTransactions.length > 0 && slowestTransactions[0].executionTime > 10000) {
                    recommendations.push(`Focus optimization efforts on the slowest transactions: ${slowestTransactions.map(t => t.technicalName).join(', ')}.`);
                }
                
                return recommendations;
            },
            
            formatTime(ms) {
                if (!ms || ms === 0) return '0ms';
                if (ms < 1000) return `${ms.toFixed(0)}ms`;
                if (ms < 60000) return `${(ms / 1000).toFixed(2)}s`;
                return `${(ms / 60000).toFixed(2)}min`;
            },
        };
        
        // ============================================
        // REPORT GENERATOR
        // ============================================
        
        const ReportGenerator = {
            async generatePDF(results, summaries) {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                const pageWidth = doc.internal.pageSize.getWidth();
                const pageHeight = doc.internal.pageSize.getHeight();
                const margin = 20;
                let y = margin;
                
                // Colors
                const primaryColor = [14, 165, 233];
                const successColor = [16, 185, 129];
                const dangerColor = [239, 68, 68];
                const warningColor = [245, 158, 11];
                const textColor = [30, 41, 59];
                const lightGray = [241, 245, 249];
                
                // Helper functions
                const addPage = () => {
                    doc.addPage();
                    y = margin;
                };
                
                const checkPageBreak = (height) => {
                    if (y + height > pageHeight - margin) {
                        addPage();
                        return true;
                    }
                    return false;
                };
                
                // Cover Page
                doc.setFillColor(...primaryColor);
                doc.rect(0, 0, pageWidth, 80, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(28);
                doc.setFont('helvetica', 'bold');
                doc.text('QA Execution Report', pageWidth / 2, 35, { align: 'center' });
                
                doc.setFontSize(14);
                doc.setFont('helvetica', 'normal');
                doc.text(results.fileName || 'Test Execution Results', pageWidth / 2, 50, { align: 'center' });
                
                doc.setFontSize(10);
                doc.text(new Date().toLocaleString(), pageWidth / 2, 65, { align: 'center' });
                
                y = 100;
                
                // Summary Cards
                doc.setTextColor(...textColor);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text('Execution Summary', margin, y);
                y += 15;
                
                const cardWidth = (pageWidth - margin * 2 - 15) / 4;
                const cardHeight = 35;
                const cards = [
                    { label: 'Total Tests', value: results.summary.total, color: primaryColor },
                    { label: 'Passed', value: results.summary.passed, color: successColor },
                    { label: 'Failed', value: results.summary.failed, color: dangerColor },
                    { label: 'Success Rate', value: `${results.summary.successRate.toFixed(1)}%`, color: successColor },
                ];
                
                cards.forEach((card, index) => {
                    const x = margin + index * (cardWidth + 5);
                    
                    doc.setFillColor(...lightGray);
                    doc.roundedRect(x, y, cardWidth, cardHeight, 3, 3, 'F');
                    
                    doc.setFillColor(...card.color);
                    doc.rect(x, y, cardWidth, 4, 'F');
                    
                    doc.setTextColor(...textColor);
                    doc.setFontSize(10);
                    doc.setFont('helvetica', 'normal');
                    doc.text(card.label, x + cardWidth / 2, y + 15, { align: 'center' });
                    
                    doc.setFontSize(16);
                    doc.setFont('helvetica', 'bold');
                    doc.text(String(card.value), x + cardWidth / 2, y + 28, { align: 'center' });
                });
                
                y += cardHeight + 20;
                
                // AI Summaries
                if (summaries && summaries.length > 0) {
                    doc.setFontSize(16);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(...textColor);
                    doc.text('Analysis & Insights', margin, y);
                    y += 10;
                    
                    summaries.forEach(summary => {
                        checkPageBreak(40);
                        
                        doc.setFillColor(...lightGray);
                        doc.roundedRect(margin, y, pageWidth - margin * 2, 5, 2, 2, 'F');
                        
                        y += 10;
                        doc.setFontSize(12);
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(...primaryColor);
                        doc.text(summary.title, margin, y);
                        y += 8;
                        
                        doc.setFontSize(10);
                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(...textColor);
                        
                        const lines = doc.splitTextToSize(summary.content, pageWidth - margin * 2);
                        lines.forEach(line => {
                            checkPageBreak(6);
                            doc.text(line, margin, y);
                            y += 6;
                        });
                        
                        y += 10;
                    });
                }
                
                // Transaction Table
                addPage();
                
                doc.setFontSize(16);
                doc.setFont('helvetica', 'bold');
                doc.setTextColor(...textColor);
                doc.text('Transaction Details', margin, y);
                y += 10;
                
                const tableData = results.transactions.slice(0, 50).map(t => [
                    t.technicalName?.substring(0, 30) || 'N/A',
                    t.status || 'N/A',
                    t.passed === true ? 'PASS' : t.passed === false ? 'FAIL' : 'N/A',
                    `${t.executionTime?.toFixed(0) || 0}ms`,
                    t.retryCount || 0,
                ]);
                
                doc.autoTable({
                    startY: y,
                    head: [['Transaction', 'Status', 'Result', 'Duration', 'Retries']],
                    body: tableData,
                    theme: 'striped',
                    headStyles: {
                        fillColor: primaryColor,
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                    },
                    styles: {
                        fontSize: 8,
                        cellPadding: 3,
                    },
                    columnStyles: {
                        0: { cellWidth: 60 },
                        1: { cellWidth: 30 },
                        2: { cellWidth: 20 },
                        3: { cellWidth: 25 },
                        4: { cellWidth: 20 },
                    },
                    didParseCell: function(data) {
                        if (data.column.index === 2 && data.section === 'body') {
                            if (data.cell.raw === 'PASS') {
                                data.cell.styles.textColor = successColor;
                            } else if (data.cell.raw === 'FAIL') {
                                data.cell.styles.textColor = dangerColor;
                            }
                        }
                    },
                });
                
                // Failed Transactions Details
                const failedTransactions = results.transactions.filter(t => t.passed === false);
                if (failedTransactions.length > 0) {
                    addPage();
                    
                    doc.setFontSize(16);
                    doc.setFont('helvetica', 'bold');
                    doc.setTextColor(...dangerColor);
                    doc.text('Failed Transactions Analysis', margin, y);
                    y += 15;
                    
                    failedTransactions.slice(0, 20).forEach((t, index) => {
                        checkPageBreak(40);
                        
                        doc.setFillColor(254, 226, 226);
                        doc.roundedRect(margin, y, pageWidth - margin * 2, 30, 3, 3, 'F');
                        
                        doc.setFontSize(11);
                        doc.setFont('helvetica', 'bold');
                        doc.setTextColor(...dangerColor);
                        doc.text(`${index + 1}. ${t.technicalName?.substring(0, 50) || 'Unknown'}`, margin + 5, y + 10);
                        
                        doc.setFontSize(9);
                        doc.setFont('helvetica', 'normal');
                        doc.setTextColor(...textColor);
                        
                        const errorMsg = t.errors[0]?.message?.substring(0, 100) || 'No error details available';
                        doc.text(`Error: ${errorMsg}`, margin + 5, y + 20);
                        
                        y += 35;
                    });
                }
                
                // Footer on all pages
                const totalPages = doc.internal.getNumberOfPages();
                for (let i = 1; i <= totalPages; i++) {
                    doc.setPage(i);
                    doc.setFontSize(8);
                    doc.setTextColor(150, 150, 150);
                    doc.text(
                        `Page ${i} of ${totalPages} | Generated by QA Execution Portal | ${new Date().toLocaleDateString()}`,
                        pageWidth / 2,
                        pageHeight - 10,
                        { align: 'center' }
                    );
                }
                
                return doc;
            },
            
            generateExcel(results, summaries) {
                const wb = XLSX.utils.book_new();
                
                // Summary Sheet
                const summaryData = [
                    ['QA Execution Report Summary'],
                    [''],
                    ['Generated', new Date().toLocaleString()],
                    ['File', results.fileName || 'N/A'],
                    [''],
                    ['Metric', 'Value'],
                    ['Total Tests', results.summary.total],
                    ['Passed', results.summary.passed],
                    ['Failed', results.summary.failed],
                    ['Success Rate', `${results.summary.successRate.toFixed(2)}%`],
                    ['Average Execution Time', `${results.summary.avgExecutionTime.toFixed(2)}ms`],
                    ['Total Retries', results.summary.totalRetries],
                    ['Start Time', results.summary.startTime?.toLocaleString() || 'N/A'],
                    ['End Time', results.summary.endTime?.toLocaleString() || 'N/A'],
                ];
                
                const summarySheet = XLSX.utils.aoa_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(wb, summarySheet, 'Summary');
                
                // All Transactions Sheet
                const transactionData = [
                    ['ID', 'Technical Name', 'Status', 'Result', 'Execution Time (ms)', 'Retry Count', 'HTTP Code', 'Timestamp', 'Errors'],
                    ...results.transactions.map(t => [
                        t.id,
                        t.technicalName,
                        t.status,
                        t.passed === true ? 'PASS' : t.passed === false ? 'FAIL' : 'N/A',
                        t.executionTime?.toFixed(2) || 0,
                        t.retryCount || 0,
                        t.httpCode || 'N/A',
                        t.timestamp?.toLocaleString() || 'N/A',
                        t.errors.map(e => e.message).join('; ').substring(0, 200),
                    ]),
                ];
                
                const transactionSheet = XLSX.utils.aoa_to_sheet(transactionData);
                XLSX.utils.book_append_sheet(wb, transactionSheet, 'All Transactions');
                
                // Failed Transactions Sheet
                const failedData = [
                    ['ID', 'Technical Name', 'Error Type', 'Error Message', 'Execution Time (ms)', 'Retry Count'],
                    ...results.transactions
                        .filter(t => t.passed === false)
                        .map(t => [
                            t.id,
                            t.technicalName,
                            t.errors[0]?.type || 'Unknown',
                            t.errors[0]?.message?.substring(0, 500) || 'No details',
                            t.executionTime?.toFixed(2) || 0,
                            t.retryCount || 0,
                        ]),
                ];
                
                const failedSheet = XLSX.utils.aoa_to_sheet(failedData);
                XLSX.utils.book_append_sheet(wb, failedSheet, 'Failed Transactions');
                
                // Retry Analysis Sheet
                const retryData = [
                    ['ID', 'Technical Name', 'Retry Count', 'Final Status', 'Execution Time (ms)'],
                    ...results.transactions
                        .filter(t => t.retryCount > 0)
                        .sort((a, b) => b.retryCount - a.retryCount)
                        .map(t => [
                            t.id,
                            t.technicalName,
                            t.retryCount,
                            t.status,
                            t.executionTime?.toFixed(2) || 0,
                        ]),
                ];
                
                const retrySheet = XLSX.utils.aoa_to_sheet(retryData);
                XLSX.utils.book_append_sheet(wb, retrySheet, 'Retry Analysis');
                
                // Performance Analysis Sheet
                const perfData = [
                    ['ID', 'Technical Name', 'Execution Time (ms)', 'Status', 'Performance Rating'],
                    ...results.transactions
                        .sort((a, b) => b.executionTime - a.executionTime)
                        .map(t => {
                            const avgTime = results.summary.avgExecutionTime;
                            let rating = 'Normal';
                            if (t.executionTime > avgTime * 2) rating = 'Slow';
                            if (t.executionTime > avgTime * 3) rating = 'Very Slow';
                            if (t.executionTime < avgTime * 0.5) rating = 'Fast';
                            
                            return [
                                t.id,
                                t.technicalName,
                                t.executionTime?.toFixed(2) || 0,
                                t.status,
                                rating,
                            ];
                        }),
                ];
                
                const perfSheet = XLSX.utils.aoa_to_sheet(perfData);
                XLSX.utils.book_append_sheet(wb, perfSheet, 'Performance Analysis');
                
                // AI Insights Sheet
                if (summaries && summaries.length > 0) {
                    const insightsData = [
                        ['AI-Generated Insights'],
                        [''],
                        ...summaries.map(s => [s.title, s.content]),
                    ];
                    
                    const insightsSheet = XLSX.utils.aoa_to_sheet(insightsData);
                    XLSX.utils.book_append_sheet(wb, insightsSheet, 'AI Insights');
                }
                
                return wb;
            },
        };

                            </div>
                        </div>
                    </div>
                </aside>
            );
        };
        
        // Upload Center Component
        const UploadCenter = ({ onFilesProcessed }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [files, setFiles] = useState([]);
            const [processing, setProcessing] = useState(false);
            const [progress, setProgress] = useState(0);
            const fileInputRef = useRef(null);
            
            const supportedTypes = ['.log', '.txt', '.trx', '.xml', '.jtl', '.json', '.zip'];
            
            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };
            
            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };
            
            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const droppedFiles = Array.from(e.dataTransfer.files);
                handleFiles(droppedFiles);
            };
            
            const handleFileSelect = (e) => {
                const selectedFiles = Array.from(e.target.files);
                handleFiles(selectedFiles);
            };
            
            const handleFiles = async (newFiles) => {
                const validFiles = [];
                
                for (const file of newFiles) {
                    const ext = '.' + file.name.split('.').pop().toLowerCase();
                    
                    if (ext === '.zip') {
                        // Extract ZIP files
                        try {
                            const zip = new JSZip();
                            const contents = await zip.loadAsync(file);
                            
                            for (const [filename, zipEntry] of Object.entries(contents.files)) {
                                if (!zipEntry.dir) {
                                    const fileExt = '.' + filename.split('.').pop().toLowerCase();
                                    if (supportedTypes.includes(fileExt) && fileExt !== '.zip') {
                                        const content = await zipEntry.async('string');
                                        validFiles.push({
                                            name: filename,
                                            content,
                                            size: content.length,
                                            type: fileExt,
                                            status: 'pending',
                                        });
                                    }
                                }
                            }
                        } catch (error) {
                            console.error('Error extracting ZIP:', error);
                        }
                    } else if (supportedTypes.includes(ext)) {
                        const content = await file.text();
                        validFiles.push({
                            name: file.name,
                            content,
                            size: file.size,
                            type: ext,
                            status: 'pending',
                        });
                    }
                }
                
                setFiles(prev => [...prev, ...validFiles]);
            };
            
            const processFiles = async () => {
                if (files.length === 0) return;
                
                setProcessing(true);
                setProgress(0);
                
                const results = [];
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // Update file status
                    setFiles(prev => prev.map((f, idx) => 
                        idx === i ? { ...f, status: 'processing' } : f
                    ));
                    
                    // Parse the file
                    const result = LogParser.parse(file.content, file.name);
                    results.push(result);
                    
                    // Update progress
                    setProgress(((i + 1) / files.length) * 100);
                    
                    // Update file status
                    setFiles(prev => prev.map((f, idx) => 
                        idx === i ? { ...f, status: 'completed', result } : f
                    ));
                    
                    // Small delay for visual feedback
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                // Merge results
                const mergedResult = {
                    fileName: files.length === 1 ? files[0].name : `${files.length} files`,
                    fileType: 'merged',
                    transactions: results.flatMap(r => r.transactions),
                    summary: {
                        total: 0,
                        passed: 0,
                        failed: 0,
                        warnings: 0,
                        avgExecutionTime: 0,
                        totalRetries: 0,
                        startTime: null,
                        endTime: null,
                    },
                    errors: results.flatMap(r => r.errors),
                    warnings: results.flatMap(r => r.warnings),
                    metadata: {
                        fileCount: files.length,
                        files: files.map(f => f.name),
                    },
                };
                
                // Recalculate summary
                LogParser.calculateSummary(mergedResult);
                
                // Generate AI summaries
                const summaries = AISummaryGenerator.generate(mergedResult);
                
                setProcessing(false);
                onFilesProcessed(mergedResult, summaries);
            };
            
            const removeFile = (index) => {
                setFiles(prev => prev.filter((_, i) => i !== index));
            };
            
            const clearFiles = () => {
                setFiles([]);
                setProgress(0);
            };
            
            const formatFileSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };
            
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-900 dark:text-white">Upload Center</h2>
                            <p className="text-gray-500 dark:text-gray-400 mt-1">Upload your test execution logs and reports</p>
                        </div>
                    </div>
