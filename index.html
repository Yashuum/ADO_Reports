                    <Card className="p-8">
                        <div
                            className={`upload-zone rounded-xl p-12 text-center ${isDragging ? 'dragover' : ''}`}
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                            onDrop={handleDrop}
                        >
                            <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center text-primary-600">
                                <Icons.Upload />
                            </div>
                            <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">
                                Drop files here or click to upload
                            </h3>
                            <p className="text-gray-500 dark:text-gray-400 mb-4">
                                Supports: .log, .txt, .trx, .xml, .jtl, .json, .zip
                            </p>
                            <Button onClick={() => fileInputRef.current?.click()}>
                                Select Files
                            </Button>
                            <input
                                ref={fileInputRef}
                                type="file"
                                multiple
                                accept={supportedTypes.join(',')}
                                onChange={handleFileSelect}
                                className="hidden"
                            />
                        </div>
                        
                        {/* Supported File Types */}
                        <div className="mt-6 flex flex-wrap gap-2 justify-center">
                            {supportedTypes.map((type) => (
                                <Badge key={type} variant="info">{type}</Badge>
                            ))}
                        </div>
                    </Card>
                    
                    {/* File List */}
                    {files.length > 0 && (
                        <Card className="p-6">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                    Selected Files ({files.length})
                                </h3>
                                <div className="flex gap-2">
                                    <Button variant="ghost" onClick={clearFiles}>
                                        Clear All
                                    </Button>
                                    <Button onClick={processFiles} disabled={processing}>
                                        {processing ? (
                                            <>
                                                <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none" />
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                                                </svg>
                                                Processing...
                                            </>
                                        ) : (
                                            <>
                                                <Icons.Zap />
                                                Process Files
                                            </>
                                        )}
                                    </Button>
                                </div>
                            </div>
                            
                            {processing && (
                                <div className="mb-4">
                                    <ProgressBar value={progress} color="primary" showLabel />
                                </div>
                            )}
                            
                            <div className="space-y-2 max-h-64 overflow-y-auto scrollbar-thin">
                                {files.map((file, index) => (
                                    <div
                                        key={index}
                                        className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 bg-white dark:bg-gray-600 rounded-lg">
                                                <Icons.File />
                                            </div>
                                            <div>
                                                <p className="text-sm font-medium text-gray-900 dark:text-white">
                                                    {file.name}
                                                </p>
                                                <p className="text-xs text-gray-500 dark:text-gray-400">
                                                    {formatFileSize(file.size)} • {file.type}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            {file.status === 'pending' && (
                                                <Badge>Pending</Badge>
                                            )}
                                            {file.status === 'processing' && (
                                                <Badge variant="warning">Processing</Badge>
                                            )}
                                            {file.status === 'completed' && (
                                                <Badge variant="success">Completed</Badge>
                                            )}
                                            <button
                                                onClick={() => removeFile(index)}
                                                className="p-1 text-gray-400 hover:text-red-500 rounded"
                                                disabled={processing}
                                            >
                                                <Icons.X />
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                    )}
                    
                    {/* Sample Data Option */}
                    <Card className="p-6">
                        <div className="flex items-center justify-between">
                            <div>
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white">
                                    Try with Sample Data
                                </h3>
                                <p className="text-gray-500 dark:text-gray-400 mt-1">
                                    Load sample execution logs to explore the portal features
                                </p>
                            </div>
                            <Button
                                variant="outline"
                                onClick={() => {
                                    // Generate sample data
                                    const sampleContent = generateSampleLogContent();
                                    handleFiles([{
                                        name: 'sample-execution.log',
                                        text: () => Promise.resolve(sampleContent),
                                    }]);
                                }}
                            >
                                Load Sample Data
                            </Button>
                        </div>
                    </Card>
                </div>
            );
        };
        
        // Generate sample log content
        const generateSampleLogContent = () => {
            const transactions = [
                { name: 'MeteredVolumes', status: 'PROCESSED', passed: true, time: 1234, retries: 0 },
                { name: 'AccountValidation', status: 'PROCESSED', passed: true, time: 2567, retries: 1 },
                { name: 'PaymentProcessing', status: 'FAILED', passed: false, time: 5432, retries: 3 },
                { name: 'InvoiceGeneration', status: 'PROCESSED', passed: true, time: 1876, retries: 0 },
                { name: 'CustomerNotification', status: 'PROCESSED', passed: true, time: 987, retries: 0 },
                { name: 'DataSynchronization', status: 'FAILED', passed: false, time: 8765, retries: 2 },
                { name: 'ReportGeneration', status: 'PROCESSED', passed: true, time: 3456, retries: 0 },
                { name: 'AuditLogging', status: 'PROCESSED', passed: true, time: 654, retries: 0 },
                { name: 'CacheRefresh', status: 'PROCESSED', passed: true, time: 432, retries: 0 },
                { name: 'SecurityValidation', status: 'PROCESSED', passed: true, time: 1234, retries: 0 },
                { name: 'APIIntegration', status: 'PROCESSED', passed: true, time: 2345, retries: 1 },
                { name: 'DatabaseBackup', status: 'PROCESSED', passed: true, time: 4567, retries: 0 },
                { name: 'EmailService', status: 'FAILED', passed: false, time: 6789, retries: 3 },
                { name: 'FileUpload', status: 'PROCESSED', passed: true, time: 1567, retries: 0 },
                { name: 'UserAuthentication', status: 'PROCESSED', passed: true, time: 876, retries: 0 },
            ];
            
            let content = '=== Azure DevOps Pipeline Execution Log ===\n';
            content += `Execution Started: ${new Date().toISOString()}\n`;
            content += 'Pipeline: Regression-Suite-Main\n';
            content += 'Agent: Azure-Agent-Pool-01\n\n';
            
            transactions.forEach((txn, index) => {
                const timestamp = new Date(Date.now() - (transactions.length - index) * 60000).toISOString();
                content += `[${timestamp}] Technical Name : ${txn.name}\n`;
                content += `[${timestamp}] Transaction Id : TXN-${String(index + 1).padStart(4, '0')}\n`;
                content += `[${timestamp}] Context Id : CTX-${Math.random().toString(36).substring(7)}\n`;
                content += `[${timestamp}] Status : ${txn.status}\n`;
                content += `[${timestamp}] Transaction In ${txn.passed ? 'Passed' : 'Failed'}\n`;
                content += `[${timestamp}] Total retry count : ${txn.retries}\n`;
                content += `[${timestamp}] Execution Time : ${txn.time}ms\n`;
                
                if (!txn.passed) {
                    content += `[${timestamp}] Error: Transaction failed after ${txn.retries} retries\n`;
                    content += `[${timestamp}] Exception: ServiceUnavailableException - The service is temporarily unavailable\n`;
                }
                
                content += '\n';
            });
            
            content += `\n=== Execution Completed: ${new Date().toISOString()} ===\n`;
            
            return content;
        };
        
        // Dashboard Component
        const Dashboard = ({ results, summaries }) => {
            const { summary, transactions } = results;
            
            // Prepare chart data
            const statusChartData = {
                labels: ['Passed', 'Failed', 'Skipped'],
                values: [summary.passed, summary.failed, summary.total - summary.passed - summary.failed],
                colors: ['#10b981', '#ef4444', '#6b7280'],
            };
            
            // Execution time distribution
            const timeRanges = ['<1s', '1-3s', '3-5s', '5-10s', '>10s'];
            const timeDistribution = [0, 0, 0, 0, 0];
            
            transactions.forEach(t => {
                const time = t.executionTime / 1000;
                if (time < 1) timeDistribution[0]++;
                else if (time < 3) timeDistribution[1]++;
                else if (time < 5) timeDistribution[2]++;
                else if (time < 10) timeDistribution[3]++;
                else timeDistribution[4]++;
            });
            
            const timeChartData = {
                labels: timeRanges,
                values: timeDistribution,
                label: 'Transactions',
            };
            
            // Retry distribution
            const retryGroups = ['0 retries', '1 retry', '2 retries', '3+ retries'];
            const retryDistribution = [0, 0, 0, 0];
            
            transactions.forEach(t => {
                if (t.retryCount === 0) retryDistribution[0]++;
                else if (t.retryCount === 1) retryDistribution[1]++;
                else if (t.retryCount === 2) retryDistribution[2]++;
                else retryDistribution[3]++;
            });
            
            const retryChartData = {
                labels: retryGroups,
                values: retryDistribution,
                label: 'Transactions',
                color: 'rgba(245, 158, 11, 0.8)',
            };
            
            // Timeline data
            const hourlyData = {};
            transactions.forEach(t => {
                if (t.timestamp) {
                    const hour = new Date(t.timestamp).getHours();
                    hourlyData[hour] = (hourlyData[hour] || 0) + 1;
                }
            });
            
            const timelineChartData = {
                labels: Object.keys(hourlyData).map(h => `${h}:00`),
                values: Object.values(hourlyData),
                label: 'Executions',
            };
            
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-900 dark:text-white">Dashboard</h2>
                            <p className="text-gray-500 dark:text-gray-400 mt-1">
                                {results.fileName} • {new Date().toLocaleDateString()}
                            </p>
                        </div>
                        <Badge variant={summary.successRate >= 95 ? 'success' : summary.successRate >= 80 ? 'warning' : 'danger'}>
                            {summary.successRate.toFixed(1)}% Success Rate
                        </Badge>
                    </div>
                    
                    {/* Metric Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <MetricCard
                            title="Total Executions"
                            value={summary.total}
                            subtitle="Test transactions"
                            icon={<Icons.Report />}
                            type="info"
                        />
                        <MetricCard
                            title="Passed"
                            value={summary.passed}
                            subtitle={`${((summary.passed / summary.total) * 100).toFixed(1)}% of total`}
                            icon={<Icons.Check />}
                            type="success"
                        />
                        <MetricCard
                            title="Failed"
                            value={summary.failed}
                            subtitle={`${((summary.failed / summary.total) * 100).toFixed(1)}% of total`}
                            icon={<Icons.X />}
                            type="danger"
                        />
                        <MetricCard
                            title="Avg Duration"
                            value={`${(summary.avgExecutionTime / 1000).toFixed(2)}s`}
                            subtitle="Per transaction"
                            icon={<Icons.Clock />}
                            type="warning"
                        />
                    </div>
                    
                    {/* AI Summary */}
                    {summaries && summaries.length > 0 && (
                        <Card className="p-6">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="p-2 bg-purple-100 dark:bg-purple-900/30 rounded-lg text-purple-600">
                                    <Icons.AI />
                                </div>
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white">AI Executive Summary</h3>
                            </div>
                            <p className="text-gray-600 dark:text-gray-300 leading-relaxed">
                                {summaries.find(s => s.type === 'executive')?.content}
                            </p>
                        </Card>
                    )}
                    
                    {/* Charts */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <DonutChart data={statusChartData} title="Test Results Distribution" />
                        <BarChart data={timeChartData} title="Execution Time Distribution" />
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <BarChart data={retryChartData} title="Retry Analysis" />
                        <LineChart data={timelineChartData} title="Execution Timeline" />
                    </div>
                    
                    {/* Quick Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="p-6">
                            <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">Slowest Transactions</h3>
                            <div className="space-y-3">
                                {[...transactions]
                                    .sort((a, b) => b.executionTime - a.executionTime)
                                    .slice(0, 5)
                                    .map((t, i) => (
                                        <div key={i} className="flex items-center justify-between">
                                            <span className="text-sm text-gray-700 dark:text-gray-300 truncate max-w-[150px]">
                                                {t.technicalName}
                                            </span>
                                            <Badge variant="warning">{(t.executionTime / 1000).toFixed(2)}s</Badge>
                                        </div>
                                    ))}
                            </div>
                        </Card>
                        
                        <Card className="p-6">
                            <h3 className="text-sm font-medium text-gray-500 dark:text-gray-400 mb-4">Most Retried</h3>
                            <div className="space-y-3">
                                {[...transactions]
                                    .filter(t => t.retryCount > 0)
                                    .sort((a, b) => b.retryCount - a.retryCount)
                                    .slice(0, 5)
                                    .map((t, i) => (
                                        <div key={i} className="flex items-center justify-between">
                                            <span className="text-sm text-gray-700 dark:text-gray-300 truncate max-w-[150px]">

                                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600">
                                    <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zm-3 9v6H8v-6h2zm4 6v-4h2v4h-2zm-4-8v2H8v-2h2z"/>
                                    </svg>
                                </div>
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">PDF Report</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">
                                    Professional PDF report with charts and analysis
                                </p>
                                <Button onClick={handleGeneratePDF} disabled={generating}>
                                    <Icons.Download />
                                    Download PDF
                                </Button>
                            </div>
                        </Card>
                        
                        <Card className="p-6" hover>
                            <div className="text-center">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600">
                                    <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
                                        <path d="M8 13h8v2H8zm0 4h8v2H8zm0-8h3v2H8z"/>
                                    </svg>
                                </div>
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">Excel Report</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">
                                    Multi-sheet Excel with detailed data
                                </p>
                                <Button onClick={handleGenerateExcel} disabled={generating} variant="success">
                                    <Icons.Download />
                                    Download Excel
                                </Button>
                            </div>
                        </Card>
                        
                        <Card className="p-6" hover>
                            <div className="text-center">
                                <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-600">
                                    <svg className="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
                                    </svg>
                                </div>
                                <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-2">JSON Export</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">
                                    Raw data export for integration
                                </p>
                                <Button onClick={handleExportJSON} variant="secondary">
                                    <Icons.Download />
                                    Download JSON
                                </Button>
                            </div>
                        </Card>
                    </div>
                    
                    {/* Report Preview */}
                    <Card className="p-6">
                        <h3 className="text-lg font-semibold text-gray-900 dark:text-white mb-4">Report Preview</h3>
                        <div className="bg-gray-50 dark:bg-gray-700/50 rounded-lg p-6 space-y-4">
                            <div className="border-b border-gray-200 dark:border-gray-600 pb-4">
                                <h4 className="text-xl font-bold text-gray-900 dark:text-white">QA Execution Report</h4>
                                <p className="text-sm text-gray-500 dark:text-gray-400">{results.fileName}</p>
                            </div>
                            
                            <div className="grid grid-cols-4 gap-4 text-center">
                                <div>
                                    <p className="text-2xl font-bold text-gray-900 dark:text-white">{results.summary.total}</p>
                                    <p className="text-xs text-gray-500">Total</p>
                                </div>
                                <div>
                                    <p className="text-2xl font-bold text-green-600">{results.summary.passed}</p>
                                    <p className="text-xs text-gray-500">Passed</p>
                                </div>
                                <div>
                                    <p className="text-2xl font-bold text-red-600">{results.summary.failed}</p>
                                    <p className="text-xs text-gray-500">Failed</p>
                                </div>
                                <div>
                                    <p className="text-2xl font-bold text-primary-600">{results.summary.successRate.toFixed(1)}%</p>
                                    <p className="text-xs text-gray-500">Success Rate</p>
                                </div>
                            </div>
                            
                            <div className="text-sm text-gray-600 dark:text-gray-300">
                                {summaries.find(s => s.type === 'executive')?.content}
                            </div>
                        </div>
                    </Card>
                </div>
            );
        };
        
        // History View Component
        const HistoryView = ({ sessions, onLoadSession, onDeleteSession }) => {
            return (
                <div className="space-y-6 animate-fade-in">
                    <div>
                        <h2 className="text-2xl font-bold text-gray-900 dark:text-white">History</h2>
                        <p className="text-gray-500 dark:text-gray-400 mt-1">
                            Previously analyzed reports
                        </p>
                    </div>
                    
                    {sessions.length === 0 ? (
                        <Card className="p-12 text-center">
                            <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-400">
                                <Icons.History />
                            </div>
                            <h3 className="text-lg font-medium text-gray-900 dark:text-white mb-2">No History Yet</h3>
                            <p className="text-gray-500 dark:text-gray-400">
                                Upload and analyze files to see them here
                            </p>
                        </Card>
                    ) : (
                        <div className="space-y-4">
                            {sessions.map((session, index) => (
                                <Card key={index} className="p-4" hover>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-primary-100 dark:bg-primary-900/30 rounded-lg text-primary-600">
                                                <Icons.File />
                                            </div>
                                            <div>
                                                <p className="font-medium text-gray-900 dark:text-white">
                                                    {session.fileName}
                                                </p>
                                                <p className="text-sm text-gray-500 dark:text-gray-400">
                                                    {new Date(session.timestamp).toLocaleString()} • {session.summary.total} transactions
                                                </p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <Badge variant={session.summary.successRate >= 95 ? 'success' : session.summary.successRate >= 80 ? 'warning' : 'danger'}>
                                                {session.summary.successRate.toFixed(1)}%
                                            </Badge>
                                            <Button variant="ghost" size="sm" onClick={() => onLoadSession(session)}>
                                                <Icons.Eye />
                                            </Button>
                                            <Button variant="ghost" size="sm" onClick={() => onDeleteSession(index)}>
                                                <Icons.Trash />
                                            </Button>
                                        </div>
                                    </div>
                                </Card>
                            ))}
                        </div>
                    )}
                </div>
            );
        };
        
        // ============================================
        // MAIN APP COMPONENT
        // ============================================
        
        const App = () => {
            const [darkMode, setDarkMode] = useState(false);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [activeView, setActiveView] = useState('upload');
            const [results, setResults] = useState(null);
            const [summaries, setSummaries] = useState([]);
            const [sessions, setSessions] = useState([]);
            
            // Load sessions from localStorage
            useEffect(() => {
                const savedSessions = localStorage.getItem('qa-portal-sessions');
                if (savedSessions) {
                    try {
                        setSessions(JSON.parse(savedSessions));
                    } catch (e) {
                        console.error('Error loading sessions:', e);
                    }
                }
                
                // Check for dark mode preference
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setDarkMode(true);
                }
            }, []);
            
            // Apply dark mode
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);
            
            // Save sessions to localStorage
            useEffect(() => {
                localStorage.setItem('qa-portal-sessions', JSON.stringify(sessions));
            }, [sessions]);
            
            const handleFilesProcessed = (newResults, newSummaries) => {
                setResults(newResults);
                setSummaries(newSummaries);
                setActiveView('dashboard');
                
                // Save to history
                const session = {
                    fileName: newResults.fileName,
                    timestamp: new Date().toISOString(),
                    summary: newResults.summary,
                    results: newResults,
                    summaries: newSummaries,
                };
                
                setSessions(prev => [session, ...prev.slice(0, 9)]);
            };
            
            const handleLoadSession = (session) => {
                setResults(session.results);
                setSummaries(session.summaries);
                setActiveView('dashboard');
            };
            
            const handleDeleteSession = (index) => {
                setSessions(prev => prev.filter((_, i) => i !== index));
            };
            
            const hasData = results !== null;
            
            const renderView = () => {
                switch (activeView) {
                    case 'upload':
                        return <UploadCenter onFilesProcessed={handleFilesProcessed} />;
                    case 'dashboard':
                        return hasData ? <Dashboard results={results} summaries={summaries} /> : null;
                    case 'transactions':
                        return hasData ? <TransactionsView results={results} /> : null;
                    case 'timeline':
                        return hasData ? <TimelineView results={results} /> : null;
                    case 'insights':
                        return hasData ? <InsightsView results={results} summaries={summaries} /> : null;
                    case 'reports':
                        return hasData ? <ReportsView results={results} summaries={summaries} /> : null;
                    case 'history':
                        return (
                            <HistoryView
                                sessions={sessions}
                                onLoadSession={handleLoadSession}
                                onDeleteSession={handleDeleteSession}
                            />
                        );
                    default:
                        return <UploadCenter onFilesProcessed={handleFilesProcessed} />;
                }
            };
            
            return (
                <div className="min-h-screen bg-gray-50 dark:bg-gray-900">
                    <Header
                        darkMode={darkMode}
                        setDarkMode={setDarkMode}
                        sidebarOpen={sidebarOpen}
                        setSidebarOpen={setSidebarOpen}
                    />
                    
                    <Sidebar
                        activeView={activeView}
                        setActiveView={setActiveView}
                        sidebarOpen={sidebarOpen}
                        hasData={hasData}
                    />
                    
                    <main className={`transition-all duration-300 ${sidebarOpen ? 'lg:ml-64' : ''} pt-4 px-6 pb-12`}>
                        <div className="max-w-7xl mx-auto">
                            {renderView()}
                        </div>
                    </main>
                    
                    {/* Mobile sidebar overlay */}
                    {sidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/50 z-20 lg:hidden"
                            onClick={() => setSidebarOpen(false)}
                        />
                    )}
                </div>
            );
        };
        
        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
