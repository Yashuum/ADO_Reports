    /* ── Scrollbar ── */

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }

    .nav-link { transition: all .18s ease; border-right: 3px solid transparent; }
    .nav-link:hover { background: rgba(14,165,233,.08); }

    .pill-fail  { background:rgba(239,68,68,.13);  color:#dc2626; }
    .pill-skip  { background:rgba(245,158,11,.13); color:#d97706; }
    .pill-abort { background:rgba(107,114,128,.13);color:#6b7280; }
    .pill-info  { background:rgba(14,165,233,.13); color:#0284c7; }
    .dark .pill-pass  { background:rgba(16,185,129,.2);  color:#34d399; }
    .dark .pill-fail  { background:rgba(239,68,68,.2);   color:#f87171; }
    .dark .pill-skip  { background:rgba(245,158,11,.2);  color:#fbbf24; }
    .dark .pill-abort { background:rgba(107,114,128,.2); color:#9ca3af; }
    .dark .pill-info  { background:rgba(14,165,233,.2);  color:#38bdf8; }

    /* ── Domain Table ── */
    .dtable { border-collapse: collapse; width: 100%; }
    .dtable th { background: #1e293b; color: #f1f5f9; padding: 9px 13px; font-size: 12px; font-weight: 700; text-align: center; border: 1px solid #334155; }
    .dtable th.text-left-col { text-align: left; }
    .dtable td { padding: 9px 13px; font-size: 13px; border: 1px solid #e2e8f0; }
    .dark .dtable td { border-color: #334155; }
    .dtable tbody tr:nth-child(even) td { background: rgba(0,0,0,.025); }
    .dark .dtable tbody tr:nth-child(even) td { background: rgba(255,255,255,.025); }
    .dtable tbody tr:hover td { background: rgba(14,165,233,.05); }
    .dtable tfoot td { background: #1e293b; color: #f1f5f9; font-weight: 700; font-size: 13px; }
    .dtable tfoot tr:last-child td { background: #be123c; color: #fff; font-size: 14px; font-weight: 800; }
    .dark .dtable tfoot td { background: #0f172a; }
    .dark .dtable tfoot tr:last-child td { background: #9f1239; }

    /* ── Test Case Row ── */
    .tc-row { cursor: pointer; transition: background .12s; }
    .tc-row:hover { background: rgba(14,165,233,.05); }
    .tc-expanded { background: rgba(14,165,233,.04); }

    /* ── Upload Zone ── */
    .upload-zone { border: 2px dashed #cbd5e1; transition: all .25s ease; }
    .upload-zone.drag { border-color: #0ea5e9; background: rgba(14,165,233,.06); transform: scale(1.01); }
    .dark .upload-zone { border-color: #475569; }
    .dark .upload-zone.drag { border-color: #38bdf8; background: rgba(14,165,233,.08); }

    /* ── Live dot ── */
    .live-dot { width:8px; height:8px; border-radius:50%; background:#10b981; flex-shrink:0; animation: livePulse 2s infinite; }
    @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.8)} }

    /* ── Modal ── */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); backdrop-filter:blur(3px); z-index:100; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-box { background:#fff; border-radius:16px; max-width:680px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,.25); }
    .dark .modal-box { background:#1e293b; }

    /* ── Progress bar ── */
    .pbar { height:6px; border-radius:9999px; background:#e2e8f0; overflow:hidden; }
    .dark .pbar { background:#334155; }
    .pbar-fill { height:100%; border-radius:9999px; transition: width .6s ease; }

    /* ── Misc ── */
    .line-clamp-1 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; }
    .line-clamp-2 { overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .rotate-90 { transform: rotate(90deg); }
    .ring-focus:focus { outline:none; box-shadow:0 0 0 3px rgba(14,165,233,.35); }
  </style>
</head>

// Domain abbreviation map: segment found in test name -> domain label
// Derived from CMS_[prefix]_ALMID_[ABBR]_ name pattern analysis
const ABBR_DOMAIN = {
  BIL:'Bill', CTEA:'CT/EA', INF:'Infeed', MSR:'Measure', MROD:'Measure',
  REC:'Rectify', C1901:'Rectify', BPMD:'Rectify', RTIE:'RTIE',
  SE:'Settle', SET:'Settle', STR:'Structure', BJ8:'Structure',
  CRP:'CrossProcess', ME:'Measure',
};

// Known module names (authoritative list)
const KNOWN_DOMAINS = ['Bill','Measure','Rectify','Settle','Structure','Infeed','RTIE','MarketPortal','CrossProcess','CT/EA'];

/* ════════════════════════════════════════════════════════════════════════
   PARSER ENGINE
   Supports: .trx · JUnit XML · JTL (XML + CSV) · plain logs · .zip (auto-extract)
═══════════════════════════════════════════════════════════════════════════ */
const Parser = {
  detectType(name, content = '') {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'trx') return 'trx';
    if (ext === 'jtl') return 'jtl';
    if (ext === 'xml') return 'xml';
    if (ext === 'json') {
      try { const j = JSON.parse(content); if (j.status || j.results || j.uuid) return 'allure'; } catch {}
      return 'json';
    }
    return 'log';
  },

  parseDuration(str) {
    if (!str) return 0;
    const parts = str.split(':');
    if (parts.length === 3)
      return (parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2])) * 1000;
    return parseFloat(str) * 1000 || 0;
  },

  /* Resolve domain + type from a test case name.
     Priority: 1) exact lookup from Excel data  2) abbreviation map  3) name pattern heuristics */
  resolveTestMeta(name = '') {
    // 1. Exact match in known test case list
    const exact = TC_LOOKUP[name];
    if (exact) return { type: exact[0], domain: exact[1] };

    // 2. Strip trailing suffixes like _Test, _FT, _TT, _FF, _TF and retry
    const stripped = name.replace(/[_\-](Test|FT|TT|FF|TF|_\d+)$/i, '');
    const stripped2 = TC_LOOKUP[stripped];
    if (stripped2) return { type: stripped2[0], domain: stripped2[1] };

    // 3. Detect type from name prefix: CMS_UI_ = UI, everything else = MSG
    const type = /^CMS_UI_/i.test(name) ? 'UI' : 'MSG';

    // 4. Extract domain from abbreviation segment after ALMID
    //    Pattern: CMS_xxx_ALMID_<ABBR>_ or CMS_xxx_RTIE_
    const almidMatch = name.match(/ALMID_([A-Z][A-Z0-9]+)_/);
    if (almidMatch) {
      const abbr = almidMatch[1];
      if (ABBR_DOMAIN[abbr]) return { type, domain: ABBR_DOMAIN[abbr] };
    }

    // 5. RTIE direct: CMS_WT_RTIE_
    if (/CMS_WT_RTIE_/i.test(name)) return { type: 'MSG', domain: 'RTIE' };

    // 6. Check if any known domain name appears in the test name
    for (const d of KNOWN_DOMAINS) {
      if (name.includes(d) || name.toUpperCase().includes(d.toUpperCase())) {
        return { type, domain: d };
      }
    }

    return { type, domain: 'General' };
  },

  // Legacy wrapper used by some parsers
  extractDomain(name = '') {
    return this.resolveTestMeta(name).domain;
  },

  normaliseStatus(raw = '') {
    const r = raw.toUpperCase().trim();
    if (['PASSED','PASS','SUCCESS','COMPLETED','OK','TRUE'].includes(r)) return 'PASSED';
    if (['FAILED','FAIL','ERROR','FAILURE','FALSE'].includes(r))          return 'FAILED';
    if (['SKIPPED','IGNORED','DISABLED','NOTEXECUTED','INCONCLUSIVE'].includes(r)) return 'SKIPPED';
    if (['ABORTED','CANCELLED','STOPPED','TIMEDOUT','TIMEOUT'].includes(r)) return 'ABORTED';
    return 'UNKNOWN';
  },

  makeTest(overrides) {
    return {
      id: Math.random().toString(36).slice(2),
      name: 'Unknown',
      domain: 'General',
      status: 'UNKNOWN',
      type: 'MSG',
      duration: 0,
      startTime: null,
      errorMessage: '',
      stackTrace: '',
      retries: 0,
      httpCode: null,
      source: '',
      ...overrides,
    };
  },

  /* ── TRX ── */
  parseTRX(content, fileName) {
    const doc = new DOMParser().parseFromString(content, 'text/xml');
    const out = [];
    doc.querySelectorAll('UnitTestResult').forEach((n, i) => {
      const name = n.getAttribute('testName') || `Test_${i}`;
      const trxMeta = this.resolveTestMeta(name);
      out.push(this.makeTest({
        id: n.getAttribute('testId') || `trx-${i}`,
        name,
        domain: trxMeta.domain,
        type: trxMeta.type,
        status: this.normaliseStatus(n.getAttribute('outcome') || ''),
        duration: this.parseDuration(n.getAttribute('duration')),
        startTime: n.getAttribute('startTime') ? new Date(n.getAttribute('startTime')) : null,
        errorMessage: n.querySelector('Message')?.textContent?.trim() || '',
        stackTrace: n.querySelector('StackTrace')?.textContent?.trim() || '',
        source: fileName,
      }));
    });
    return out;
  },

  /* ── JUnit XML ── */
  parseJUnitXML(content, fileName) {
    const doc = new DOMParser().parseFromString(content, 'text/xml');
    const out = [];
    doc.querySelectorAll('testcase').forEach((n, i) => {
      const name     = n.getAttribute('name') || `Test_${i}`;
      const cls      = n.getAttribute('classname') || '';
      const failure  = n.querySelector('failure')?.textContent?.trim();
      const error    = n.querySelector('error')?.textContent?.trim();
      const skipped  = n.querySelector('skipped');
      let status = 'PASSED';
      if (failure || error) status = 'FAILED';
      else if (skipped)     status = 'SKIPPED';
      const junitMeta = this.resolveTestMeta(name);
      out.push(this.makeTest({
        id: `junit-${i}`,
        name,
        domain: junitMeta.domain,
        type: junitMeta.type,
        status,
        duration: parseFloat(n.getAttribute('time') || '0') * 1000,
        errorMessage: (failure || error || '').substring(0, 500),
        source: fileName,
      }));
    });
    return out;
  },

  /* ── JTL (XML or CSV) ── */
  parseJTL(content, fileName) {
    const out = [];
    if (content.trimStart().startsWith('<')) {
      const doc = new DOMParser().parseFromString(content, 'text/xml');
      doc.querySelectorAll('httpSample,sample,Sample').forEach((n, i) => {
        const success = n.getAttribute('s') === 'true';
        const label   = n.getAttribute('lb') || `Sample_${i}`;
        const ts      = parseInt(n.getAttribute('ts') || '0');
        const jtlMeta = this.resolveTestMeta(label);
        out.push(this.makeTest({
          id: `jtl-${i}`, name: label,
          domain: jtlMeta.domain,
          type: jtlMeta.type,
          status: success ? 'PASSED' : 'FAILED',
          duration: parseInt(n.getAttribute('t') || '0'),
          startTime: ts ? new Date(ts) : null,
          errorMessage: !success ? (n.getAttribute('rm') || 'Request failed') : '',
          httpCode: parseInt(n.getAttribute('rc') || '0') || null,
          source: fileName,
        }));
      });
      return out;
    }
    // CSV fallback
    const lines = content.split('\n');
    const hdr = lines[0]?.split(',').map(h => h.trim().toLowerCase()) || [];
    const col = k => hdr.indexOf(k);
    for (let i = 1; i < lines.length; i++) {
      const c = lines[i].split(',');
      if (c.length < 3) continue;
      const success = (c[col('success')] || c[col('s')] || '').toLowerCase() === 'true';
      const label   = c[col('label')] || c[col('lb')] || `Row_${i}`;
      const csvMeta = this.resolveTestMeta(label);
      out.push(this.makeTest({
        id: `jtl-csv-${i}`, name: label,
        domain: csvMeta.domain,
        type: csvMeta.type,
        status: success ? 'PASSED' : 'FAILED',
        duration: parseInt(c[col('elapsed')] || c[col('t')] || '0'),
        errorMessage: !success ? 'Request failed' : '',
        source: fileName,
      }));
    }
    return out;
  },

  /* ── Allure JSON ── */
  parseAllure(content, fileName) {
    try {
      const j = JSON.parse(content);
      const items = Array.isArray(j) ? j : j.results ? j.results : [j];
      return items.map((item, i) => this.makeTest({
        id: item.uuid || `allure-${i}`,
        name: item.name || item.fullName || `Test_${i}`,
        domain: item.labels?.find(l => l.name === 'suite')?.value || this.extractDomain(item.name || ''),
        status: this.normaliseStatus(item.status || ''),
        duration: item.stop && item.start ? item.stop - item.start : 0,
        startTime: item.start ? new Date(item.start) : null,
        errorMessage: item.statusDetails?.message || '',
        stackTrace: item.statusDetails?.trace || '',
        source: fileName,
      }));
    } catch { return []; }
  },

  /* ── Plain Text / Log ── */
  /* ─────────────────────────────────────────────────────────────────────
     Log structure understood from your Azure DevOps console output:

     TEST CASE level (one block per test case):
       "Execution started for test case - <NAME>. MessageId : X. Module : Y"
       "Test Case <NAME> executed with MessageId : X. Test Outcome : <STATUS>"
       OR "Testcase failed" / "Testcase passed"

     TRANSACTION level (internal steps WITHIN a test case — NOT separate tests):
       "Technical Name : <txName>"
       "Transaction In Passed. TechnicalName : <txName>. Status : PROCESSED"
       "Transaction In Failed. TechnicalName : <txName>."
       "Total retry count : N"

     Rules:
     - A test case block opens on "Execution started for test case"
     - Duplicate "Execution started" lines for the same test name are ignored
     - Internal "Technical Name" lines are steps, never new test cases
     - "Transaction In Passed/Failed" are steps within the current test
     - Test case status comes from "Test Outcome : <STATUS>" or "Testcase failed/passed"
     - If no explicit outcome found, derive from internal step failures
  ─────────────────────────────────────────────────────────────────────── */
  parseLog(content, fileName) {
    const lines = content.split(/\r?\n/);
    const out   = [];

    // ── Regex patterns ──────────────────────────────────────────────────
    const P = {
      // Test case open: "Execution started for test case - NAME. MessageId : X. Module : Y"
      tcOpen:     /Execution\s+started\s+for\s+test\s+case\s*[-–]\s*(.+?)\s*\.\s*MessageId\s*:\s*([^.]*)\s*\.\s*Module\s*:\s*(\S+)/i,

      // Test case close: "Test Case NAME executed with MessageId : X. Test Outcome : STATUS"
      tcClose:    /Test\s+Case\s+(.+?)\s+executed\s+with\s+MessageId\s*:\s*[^.]*\.\s*Test\s+Outcome\s*:\s*(\w+)/i,

      // Simple close markers
      tcFailed:   /^\[?[^\]]*\]?\s*Testcase\s+failed/i,
      tcPassed:   /^\[?[^\]]*\]?\s*Testcase\s+passed/i,

      // Internal transaction step (NOT a new test case)
      txPassed:   /Transaction\s+In\s+Passed\.\s*TechnicalName\s*:\s*([^.]+)\.\s*Status\s*:\s*(\w+)/i,
      txFailed:   /Transaction\s+In\s+Failed\.\s*TechnicalName\s*:\s*([^.]+)/i,

      // Step name (within current test case)
      techName:   /^\[?[^\]]*\]?\s*Technical\s+Name\s*:\s*(.+)/i,

      // Module declared in the start line (already captured, but also as standalone)
      module:     /Module\s*:\s*(\S+)/i,

      // Metrics within a step
      retry:      /(?:Total\s+)?retry\s+count\s*[:\s]+\s*(\d+)/i,
      duration:   /Total\s+Time\s+for\s+(?:status\s+update|execution)\s*[:\s]+\s*([\d.]+)\s*(ms|s)?/i,

      // Timestamp at start of line: [HH:MM:SS ...] or HH:MM:SS
      timestamp:  /^\[?(\d{2}:\d{2}:\d{2})/,

      // HTTP errors
      http401:    /401\s+Unauthorized/i,
      httpCode:   /HTTP\s*(?:Status|Code)?\s*[:\-]?\s*(\d{3})/i,

      // Error/exception lines
      errLine:    /^\[?[^\]]*\]?\s*(?:ERR|ERROR)\]?\s*(.+)/i,
      exception:  /Exception\s*[:\-]\s*(.+)/i,
    };

    let cur     = null;   // current open test case
    let lastEnd = '';     // timestamp of last closed test

    const parseTime = (ts) => {
      if (!ts) return null;
      try {
        const today = new Date().toISOString().slice(0,10);
        return new Date(today + 'T' + ts + 'Z');
      } catch { return null; }
    };

    const flush = (status) => {
      if (!cur) return;
      if (status) cur.status = status;
      // If still UNKNOWN after all lines, check if any step failed
      if (cur.status === 'UNKNOWN') {
        cur.status = cur._stepFailed ? 'FAILED' : (cur._stepsPassed > 0 ? 'PASSED' : 'UNKNOWN');
      }
      // Clean up internal tracking fields
      delete cur._stepFailed;
      delete cur._stepsPassed;
      delete cur._lastTechName;
      out.push(cur);
      cur = null;
    };

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;

      // ── Timestamp ──────────────────────────────────────────────────────
      const tsM = line.match(P.timestamp);
      const ts  = tsM ? tsM[1] : null;

      // ── Test Case OPEN ─────────────────────────────────────────────────
      const openM = line.match(P.tcOpen);
      if (openM) {
        const tcName = openM[1].trim();
        const module = openM[3].trim();

        // Deduplicate: if same test name is already open, skip
        if (cur && cur.name === tcName) continue;

        // Flush any previous open test
        flush();

        const meta = this.resolveTestMeta(tcName);
        cur = this.makeTest({
          id:        `log-${i}`,
          name:      tcName,
          domain:    meta.domain !== 'General' ? meta.domain : (this._moduleToKnownDomain(module) || meta.domain),
          type:      meta.type,
          startTime: parseTime(ts),
          source:    fileName,
          _stepFailed:   false,
          _stepsPassed:  0,
          _lastTechName: '',
        });
        continue;
      }

      // ── Test Case CLOSE (authoritative outcome line) ────────────────────
      const closeM = line.match(P.tcClose);
      if (closeM) {
        const status = this.normaliseStatus(closeM[2]);
        if (cur) {
          cur.endTime = parseTime(ts);
          if (cur.startTime && cur.endTime) {
            cur.duration = cur.endTime - cur.startTime;
          }
        } else {
          // No open test — create one from close line
          const tcName = closeM[1].trim();
          const meta   = this.resolveTestMeta(tcName);
          cur = this.makeTest({ id:`log-close-${i}`, name: tcName, domain: meta.domain, type: meta.type, source: fileName });
        }
        flush(status);
        continue;
      }

      // ── Test Case FAILED / PASSED simple markers ───────────────────────
      if (P.tcFailed.test(line)) { if (cur) { cur.endTime = parseTime(ts); if(cur.startTime&&cur.endTime) cur.duration=cur.endTime-cur.startTime; } flush('FAILED'); continue; }
      if (P.tcPassed.test(line)) { if (cur) { cur.endTime = parseTime(ts); if(cur.startTime&&cur.endTime) cur.duration=cur.endTime-cur.startTime; } flush('PASSED'); continue; }

      if (!cur) continue;   // Nothing open — ignore non-test lines

      // ── Internal Step: Transaction In Passed ───────────────────────────
      const txPM = line.match(P.txPassed);
      if (txPM) {
        cur._stepsPassed = (cur._stepsPassed || 0) + 1;
        // Add step to the steps list for later display
        if (!cur.steps) cur.steps = [];
        cur.steps.push({ name: txPM[1].trim(), status: 'PASSED', retries: cur._pendingRetry || 0 });
        cur._pendingRetry = 0;
        continue;
      }

      // ── Internal Step: Transaction In Failed ───────────────────────────
      const txFM = line.match(P.txFailed);
      if (txFM) {
        cur._stepFailed = true;
        if (!cur.steps) cur.steps = [];
        cur.steps.push({ name: txFM[1].trim(), status: 'FAILED', retries: cur._pendingRetry || 0 });
        cur._pendingRetry = 0;
        continue;
      }

      // ── Technical Name (step label — NOT a new test case) ─────────────
      const techM = line.match(P.techName);
      if (techM) { cur._lastTechName = techM[1].trim(); continue; }

      // ── Retry count (belongs to current step) ─────────────────────────
      const retM = line.match(P.retry);
      if (retM) {
        const r = parseInt(retM[1]);
        cur.retries = Math.max(cur.retries || 0, r);
        cur._pendingRetry = r;
        continue;
      }

      // ── Duration ──────────────────────────────────────────────────────
      const durM = line.match(P.duration);
      if (durM && !cur.duration) {
        cur.duration = parseFloat(durM[1]) * (durM[2]?.toLowerCase().startsWith('s') && !durM[2]?.toLowerCase().startsWith('ms') ? 1000 : 1);
      }

      // ── HTTP 401 ──────────────────────────────────────────────────────
      if (P.http401.test(line)) {
        cur.httpCode = 401;
        if (!cur.errorMessage) cur.errorMessage = '401 Unauthorized (KeyVault/Auth failure)';
      }

      // ── ERR lines (capture first meaningful error) ─────────────────────
      // Only match lines where ERR/ERROR appears right after the timestamp bracket
      const errM = line.match(/^\[?\d{2}:\d{2}:\d{2}[^\]]*\]?\s*(?:ERR|ERROR)\]?\s+(.+)/i);
      if (errM && !cur.errorMessage) {
        const msg = errM[1].trim();
        if (!/^Testcase (failed|passed)/i.test(msg)) {
          cur.errorMessage = msg.substring(0, 400);
        }
      }
    }

    flush(); // Close any still-open test at EOF

    // ── Synthetic fallback: if nothing structured found, look for bare PASSED/FAILED ──
    if (out.length === 0) {
      lines.forEach((line, lnum) => {
        const m = line.match(/\b(PASSED|FAILED|SKIPPED|ABORTED|PASS|FAIL)\b/i);
        if (m) {
          const synName = line.trim().substring(0, 70) || `Line_${lnum}`;
          const synMeta = this.resolveTestMeta(synName);
          out.push(this.makeTest({
            id: `syn-${lnum}`,
            name: synName,
            domain: synMeta.domain,
            type: synMeta.type,
            status: this.normaliseStatus(m[1]),
            errorMessage: ['FAILED','FAIL'].includes(m[1].toUpperCase()) ? line.trim().substring(0, 200) : '',
            source: fileName,
          }));
        }
      });
    }

    return out;
  },

  /* Helper: map the Module label from the log line to a known domain */
  _moduleToKnownDomain(module = '') {
    const m = module.toUpperCase();
    const map = {
      'BIL':'Bill','BILL':'Bill',
      'CTEA':'CT/EA','CT':'CT/EA',
      'INF':'Infeed','INFEED':'Infeed',
      'MSR':'Measure','MEASURE':'Measure',
      'MROD':'Measure',
      'REC':'Rectify','RECTIFY':'Rectify',
      'RTIE':'RTIE',
      'SE':'Settle','SET':'Settle','SETTLE':'Settle',
      'STR':'Structure','STRUCTURE':'Structure',
      'CRP':'CrossProcess','CROSSPROCESS':'CrossProcess',
      'MARKETPORTAL':'MarketPortal',
    };
    return map[m] || null;
  },

  /* ── Entry Point ── */
  parse(content, fileName) {
    const type = this.detectType(fileName, content);
    try {
      if (type === 'trx')    return this.parseTRX(content, fileName);
      if (type === 'jtl')    return this.parseJTL(content, fileName);
      if (type === 'allure') return this.parseAllure(content, fileName);
      if (type === 'xml') {
        const root = new DOMParser().parseFromString(content, 'text/xml').documentElement.tagName.toLowerCase();
        if (root === 'testsuites' || root === 'testsuite') return this.parseJUnitXML(content, fileName);
        if (root === 'testresults') return this.parseTRX(content, fileName);
        return this.parseLog(content, fileName);
      }
      return this.parseLog(content, fileName);
    } catch (e) {
      console.warn('Parser error:', fileName, e);
      return [];
    }
  },
};

/* ════════════════════════════════════════════════════════════════════════
   DATA HELPERS
═══════════════════════════════════════════════════════════════════════════ */
function buildStats(tests = []) {
  const total   = tests.length;
  const passed  = tests.filter(t => t.status === 'PASSED').length;
  const failed  = tests.filter(t => t.status === 'FAILED').length;
  const skipped = tests.filter(t => t.status === 'SKIPPED').length;
  const aborted = tests.filter(t => t.status === 'ABORTED').length;
  const unknown = total - passed - failed - skipped - aborted;
  const durs    = tests.map(t => t.duration || 0);
  const totalDur= durs.reduce((a, b) => a + b, 0);
  const avgDur  = total ? totalDur / total : 0;
  const successRate = total ? (passed / total) * 100 : 0;
  const totalRetries = tests.reduce((a, t) => a + (t.retries || 0), 0);
  return { total, passed, failed, skipped, aborted, unknown, totalDur, avgDur, successRate, totalRetries };
}

function buildDomainReport(tests = []) {
  const map = {};
  tests.forEach(t => {
    const d = t.domain || 'General';
    if (!map[d]) map[d] = {
      domain: d,
      MSG: { total:0, passed:0, failed:0, skipped:0, aborted:0 },
      UI:  { total:0, passed:0, failed:0, skipped:0, aborted:0 },
    };
    const cat = t.type === 'UI' ? 'UI' : 'MSG';
    map[d][cat].total++;
    if (t.status === 'PASSED')  map[d][cat].passed++;
    if (t.status === 'FAILED')  map[d][cat].failed++;
    if (t.status === 'SKIPPED') map[d][cat].skipped++;
    if (t.status === 'ABORTED') map[d][cat].aborted++;
  });
  return Object.values(map).sort((a, b) =>
    (b.MSG.total + b.UI.total) - (a.MSG.total + a.UI.total)
  );
}

function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  if (ms < 1000) return `${Math.round(ms)}ms`;
  if (ms < 60000) return `${(ms/1000).toFixed(2)}s`;
  return `${Math.floor(ms/60000)}m ${((ms%60000)/1000).toFixed(0)}s`;
}

/* ── Chart Expand Modal ── */
const ChartModal = ({ title, type, data, options, onClose }) => {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  // Build expanded options: keep caller opts but force data labels visible
  const expandedOptions = React.useMemo(() => {
    const isBar      = type === 'bar';
    const isDoughnut = type === 'doughnut';

    const dataLabelPlugin = {
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        chart.data.datasets.forEach((dataset, di) => {
          const meta = chart.getDatasetMeta(di);
          if (meta.hidden) return;
          meta.data.forEach((element, index) => {
            const value = dataset.data[index];
            if (!value && value !== 0) return;
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 13px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = isBar ? 'bottom' : 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.55)';
            ctx.shadowBlur = 4;
            if (isBar) {
              const { x, y } = element.tooltipPosition();
              if (value > 0) ctx.fillText(value, x, y - 4);
            } else if (isDoughnut) {
              const { x, y } = element.tooltipPosition();
              ctx.fillText(value, x, y);
            }
            ctx.restore();
          });
        });
      }
    };

    return {
      responsive: true,
      maintainAspectRatio: false,
      ...options,
      plugins: {
        ...(options?.plugins || {}),
        legend: {
          ...(options?.plugins?.legend || {}),
          labels: {
            ...(options?.plugins?.legend?.labels || {}),
            font: { size: 13 },
            boxWidth: 14,
          }
        },
        customDataLabels: dataLabelPlugin,
      },
      scales: isBar ? {
        x: { ...(options?.scales?.x || {}), ticks: { font: { size: 12 } } },
        y: { ...(options?.scales?.y || {}), ticks: { font: { size: 12 } } },
      } : undefined,
    };
  }, [type, data, options]);

  useEffect(() => {
    if (!canvasRef.current) return;
    chartRef.current?.destroy();

    // Register inline plugin
    const plugin = expandedOptions.plugins?.customDataLabels;
    const plugins = plugin ? [plugin] : [];

    chartRef.current = new Chart(canvasRef.current, {
      type, data,
      options: expandedOptions,
      plugins,
    });
    return () => chartRef.current?.destroy();
  }, [data, expandedOptions]);

  // Close on backdrop click
  const onBackdrop = e => { if (e.target === e.currentTarget) onClose(); };

  return (
    <div className="modal-backdrop" onClick={onBackdrop} style={{zIndex:200}}>
      <div className="modal-box" style={{maxWidth:'92vw', width:'900px', maxHeight:'88vh'}}>
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
          <h3 className="font-bold text-base">{title}</h3>
          <button onClick={onClose}
            className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition-colors">
            <Ic.X />
          </button>
        </div>
        {/* Chart */}
        <div className="p-6" style={{height:'520px'}}>
          <canvas ref={canvasRef} />
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   DOMAIN TABLE FULL  (Domain Report page — shows Skipped/Aborted dynamically)
   Dashboard keeps the simple DomainTable (Exec/Pass/Fail only).
   This version auto-detects which extra statuses are present and shows
   those columns only when at least 1 test has that status.
═══════════════════════════════════════════════════════════════════════════ */
const DomainTableFull = ({ rows, title = 'Domain-wise Execution Summary', subtitle }) => {
  // Detect which extra statuses actually exist in this dataset
  const hasSkipped = rows.some(r => r.MSG.skipped > 0 || r.UI.skipped > 0);
  const hasAborted = rows.some(r => r.MSG.aborted > 0 || r.UI.aborted > 0);

  // Compute totals dynamically
  const totals = {
    MSG: { ex:0, pa:0, fa:0, sk:0, ab:0 },
    UI:  { ex:0, pa:0, fa:0, sk:0, ab:0 },
  };
  rows.forEach(r => {
    totals.MSG.ex += r.MSG.total;   totals.UI.ex += r.UI.total;
    totals.MSG.pa += r.MSG.passed;  totals.UI.pa += r.UI.passed;
    totals.MSG.fa += r.MSG.failed;  totals.UI.fa += r.UI.failed;
    totals.MSG.sk += r.MSG.skipped; totals.UI.sk += r.UI.skipped;
    totals.MSG.ab += r.MSG.aborted; totals.UI.ab += r.UI.aborted;
  });

  const grandEx = totals.MSG.ex + totals.UI.ex;
  const grandPa = totals.MSG.pa + totals.UI.pa;
  const grandFa = totals.MSG.fa + totals.UI.fa;
  const grandSk = totals.MSG.sk + totals.UI.sk;
  const grandAb = totals.MSG.ab + totals.UI.ab;
  const rate = grandEx ? (grandPa / grandEx) * 100 : 100;

  // Extra column groups that appear dynamically
  const extraCols = [
    hasSkipped && { key: 'skipped', label: 'Skipped',  msgKey: 'skipped', color: 'text-amber-500 dark:text-amber-400',  totalMsg: totals.MSG.sk, totalUI: totals.UI.sk, grand: grandSk },
    hasAborted && { key: 'aborted', label: 'Aborted',  msgKey: 'aborted', color: 'text-slate-400',                       totalMsg: totals.MSG.ab, totalUI: totals.UI.ab, grand: grandAb },
  ].filter(Boolean);

  // How many colspan groups total (for grand total row)
  const numStatusGroups = 2 + extraCols.length; // Passed + Failed + extras

  return (
    <Card className="overflow-hidden">
      <div className="px-5 py-4 border-b border-slate-200 dark:border-slate-700 flex items-start justify-between gap-3">
        <div>
          <h3 className="font-bold text-base">{title}</h3>
          {subtitle && <p className="text-xs text-slate-500 mt-0.5 truncate max-w-lg">{subtitle}</p>}
          {(hasSkipped || hasAborted) && (
            <div className="flex gap-2 mt-1.5 flex-wrap">
              {hasSkipped && <span className="pill pill-skip text-[10px]">Skipped column active</span>}
              {hasAborted && <span className="pill pill-abort text-[10px]">Aborted column active</span>}
            </div>
          )}
        </div>
        <span className={`pill flex-shrink-0 text-sm px-3 py-1 ${rate >= 95 ? 'pill-pass' : rate >= 80 ? 'pill-skip' : 'pill-fail'}`}>
          {rate.toFixed(2)}% Overall
        </span>
      </div>

      <div className="overflow-x-auto">
        <table className="dtable">
          <thead>
            <tr>
              <th rowSpan={2} className="text-left-col" style={{minWidth:140}}>Domain / Module</th>
              <th colSpan={2}>Executed</th>
              <th colSpan={2}>Passed</th>
              <th colSpan={2}>Failed</th>
              {extraCols.map(ec => (
                <th key={ec.key} colSpan={2}>{ec.label}</th>
              ))}
              <th rowSpan={2} style={{minWidth:160}}>Pass Rate</th>
            </tr>
            <tr>
              <th>Msg</th><th>UI</th>
              <th>Msg</th><th>UI</th>
              <th>Msg</th><th>UI</th>
              {extraCols.map(ec => (
                <React.Fragment key={ec.key}>
                  <th>Msg</th><th>UI</th>
                </React.Fragment>
              ))}
            </tr>
          </thead>

          <tbody>
            {rows.map(r => {
              const ex = r.MSG.total   + r.UI.total;
              const pa = r.MSG.passed  + r.UI.passed;
              const dr = ex ? (pa / ex) * 100 : 100;
              return (
                <tr key={r.domain}>
                  <td className="font-semibold text-left-col">{r.domain}</td>
                  {/* Executed */}
                  <td className="text-center">{r.MSG.total}</td>
                  <td className="text-center">{r.UI.total}</td>
                  {/* Passed */}
                  <td className="text-center font-semibold text-emerald-600 dark:text-emerald-400">{r.MSG.passed}</td>
                  <td className="text-center font-semibold text-emerald-600 dark:text-emerald-400">{r.UI.passed}</td>
                  {/* Failed */}
                  <td className="text-center font-semibold text-red-600 dark:text-red-400">{r.MSG.failed}</td>
                  <td className="text-center font-semibold text-red-600 dark:text-red-400">{r.UI.failed}</td>
                  {/* Dynamic extra columns */}
                  {extraCols.map(ec => (
                    <React.Fragment key={ec.key}>
                      <td className={`text-center font-semibold ${ec.color} ${r.MSG[ec.msgKey] > 0 ? '' : 'opacity-30'}`}>
                        {r.MSG[ec.msgKey]}
                      </td>
                      <td className={`text-center font-semibold ${ec.color} ${r.UI[ec.msgKey] > 0 ? '' : 'opacity-30'}`}>
                        {r.UI[ec.msgKey]}
                      </td>
                    </React.Fragment>
                  ))}
                  {/* Pass rate */}
                  <td className="px-4"><RateBar rate={dr} /></td>
                </tr>
              );
            })}
          </tbody>

          <tfoot>
            {/* Sub-Total row */}
            <tr>
              <td className="text-left-col">Sub-Total</td>
              <td className="text-center">{totals.MSG.ex}</td><td className="text-center">{totals.UI.ex}</td>
              <td className="text-center">{totals.MSG.pa}</td><td className="text-center">{totals.UI.pa}</td>
              <td className="text-center">{totals.MSG.fa}</td><td className="text-center">{totals.UI.fa}</td>
              {extraCols.map(ec => (
                <React.Fragment key={ec.key}>
                  <td className="text-center">{ec.totalMsg}</td>
                  <td className="text-center">{ec.totalUI}</td>
                </React.Fragment>
              ))}
              <td className="text-center">{rate.toFixed(2)}%</td>
            </tr>
            {/* Grand Total row */}
            <tr>
              <td className="text-left-col">Grand Total</td>
              <td colSpan={2} className="text-center">{grandEx}</td>
              <td colSpan={2} className="text-center">{grandPa}</td>
              <td colSpan={2} className="text-center">{grandFa}</td>
              {extraCols.map(ec => (
                <td key={ec.key} colSpan={2} className="text-center">{ec.grand}</td>
              ))}
              <td className="text-center">{rate.toFixed(2)}%</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </Card>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   UPLOAD CENTER
═══════════════════════════════════════════════════════════════════════════ */
const UploadView = ({ onProcessed }) => {
  const [dragging, setDragging] = useState(false);
  const [fileList, setFileList] = useState([]);
  const [busy, setBusy]         = useState(false);
  const [runName, setRunName]   = useState('');
  const fileRef = useRef(null);

  const addFiles = files => setFileList(prev => [
    ...prev,
    ...[...files].map(f => ({ file: f, id: Math.random().toString(36).slice(2), st: 'ready', err: '' }))
  ]);

  const onDrop = e => { e.preventDefault(); setDragging(false); addFiles(e.dataTransfer.files); };

  const process = async () => {
    if (!fileList.length || busy) return;
    setBusy(true);
    const runs = [];

    for (const entry of fileList) {
      setFileList(prev => prev.map(f => f.id === entry.id ? { ...f, st: 'parsing' } : f));
      try {
        if (entry.file.name.toLowerCase().endsWith('.zip')) {
          const zip = await JSZip.loadAsync(entry.file);
          const inner = Object.entries(zip.files).filter(([n]) => /\.(log|txt|xml|trx|jtl|json)$/i.test(n) && !zip.files[n].dir);
          for (const [name, zf] of inner) {
            const text = await zf.async('text');
            const tests = Parser.parse(text, name);
            if (tests.length) runs.push({ fileName: name, pipelineName: runName || name, tests, uploadedAt: new Date() });
          }
        } else {
          const text = await new Promise((res, rej) => {
            const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsText(entry.file);
          });
          const tests = Parser.parse(text, entry.file.name);
          runs.push({ fileName: entry.file.name, pipelineName: runName || entry.file.name, tests, uploadedAt: new Date() });
        }
        setFileList(prev => prev.map(f => f.id === entry.id ? { ...f, st: 'done' } : f));
      } catch (e) {
        setFileList(prev => prev.map(f => f.id === entry.id ? { ...f, st: 'error', err: e.message } : f));
      }
    }

    setBusy(false);
    if (runs.length) onProcessed(runs, runName);
  };

  return (
    <div className="fade-in space-y-6 max-w-3xl mx-auto">
      <div>
        <h2 className="text-2xl font-black">Upload Execution Logs</h2>
        <p className="text-slate-500 dark:text-slate-400 mt-1 text-sm">Each file becomes one pipeline run with individual test case breakdown. ZIP archives are auto-extracted.</p>
      </div>

      {/* Run name */}
      <div>
        <label className="block text-sm font-semibold mb-1.5">Pipeline / Run Name <span className="text-slate-400 font-normal">(optional)</span></label>
        <input
          value={runName}
          onChange={e => setRunName(e.target.value)}
          placeholder="e.g. Sprint 42 Regression · UAT Pass 3"
          className="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-700 text-sm ring-focus focus:border-brand-400"
        />
      </div>

      {/* Drop zone */}
      <div
        onDrop={onDrop}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onClick={() => fileRef.current?.click()}
        className={`upload-zone rounded-2xl p-14 text-center cursor-pointer select-none ${dragging ? 'drag' : ''}`}
      >
        <input ref={fileRef} type="file" multiple accept=".log,.txt,.trx,.xml,.jtl,.json,.zip" className="hidden"
          onChange={e => { addFiles(e.target.files); e.target.value = ''; }} />
        <div className="flex flex-col items-center gap-3">
          <div className={`w-16 h-16 rounded-2xl flex items-center justify-center transition-colors
            ${dragging ? 'bg-brand-100 dark:bg-brand-900/30 text-brand-600' : 'bg-slate-100 dark:bg-slate-700 text-slate-400'}`}>
            <Ic.Upload />
          </div>
          <div>
            <p className="font-bold text-lg">{dragging ? 'Release to upload!' : 'Drag & drop files here'}</p>
            <p className="text-sm text-slate-500 mt-0.5">or click to browse</p>
          </div>
          <div className="flex flex-wrap justify-center gap-2 mt-1">
            {['.log','.txt','.trx','.xml','.jtl','.json','.zip'].map(e => (
              <span key={e} className="px-2 py-0.5 bg-slate-100 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded text-xs mono font-semibold text-slate-500">{e}</span>
            ))}
          </div>
          <p className="text-xs text-slate-400">Max 200MB · Multiple files supported · ZIP auto-extracted</p>
        </div>
      </div>

      {/* File list */}
      {fileList.length > 0 && (
        <Card className="divide-y divide-slate-100 dark:divide-slate-700">
          {fileList.map(entry => (
            <div key={entry.id} className="flex items-center gap-3 px-4 py-3">
              <div className={`w-2 h-2 rounded-full flex-shrink-0 ${
                entry.st === 'done' ? 'bg-emerald-500' :
                entry.st === 'error' ? 'bg-red-500' :
                entry.st === 'parsing' ? 'bg-amber-400 animate-pulse' : 'bg-slate-300'
              }`} />
              <span className="flex-1 text-sm font-medium truncate" title={entry.file.name}>{entry.file.name}</span>
              <span className="text-xs text-slate-400 flex-shrink-0">{(entry.file.size / 1024).toFixed(0)} KB</span>
              <span className={`text-xs font-semibold flex-shrink-0 ${
                entry.st === 'done' ? 'text-emerald-600' :
                entry.st === 'error' ? 'text-red-500' :
                entry.st === 'parsing' ? 'text-amber-600' : 'text-slate-400'
              }`}>
                {entry.st === 'parsing' ? 'Parsing…' : entry.st === 'done' ? '✓ Done' : entry.st === 'error' ? `✗ ${entry.err.substring(0,40)}` : 'Ready'}
              </span>
              {entry.st === 'ready' && (
                <button onClick={e => { e.stopPropagation(); setFileList(p => p.filter(f => f.id !== entry.id)); }}
                  className="text-slate-400 hover:text-red-500 transition-colors flex-shrink-0">
                  <Ic.X />
                </button>
              )}
            </div>
          ))}
        </Card>
      )}

      {/* Actions */}
      <div className="flex gap-3">
        <Btn onClick={process} disabled={!fileList.length || busy} size="lg">
          {busy ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" />Parsing…</> : <><Ic.Zap />Parse & Analyse</>}
        </Btn>
        {fileList.length > 0 && !busy && (
          <Btn onClick={() => setFileList([])} variant="outline" size="lg">Clear All</Btn>
        )}
      </div>

      {/* Tips */}
      <Card className="p-5">
        <p className="text-sm font-bold mb-3 flex items-center gap-2 text-slate-700 dark:text-slate-300"><Ic.Info /> What gets extracted from logs</p>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1.5 text-xs text-slate-500 dark:text-slate-400">
          {[
            'Test case names & domain/module groups','Pass / Fail / Skipped / Aborted per test',
            'Execution duration & validation time','Retry counts per transaction',
            'Error messages & full stack traces','HTTP status codes (401, 500, etc.)',
            'SOAP/API response indicators','Azure DevOps pipeline stage info',
            'MSG vs UI test type auto-detection','Build info, agent name, branch',
          ].map(tip => (
            <div key={tip} className="flex items-center gap-1.5">
              <Ic.Check /><span>{tip}</span>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
        <KPI label="Total Tests"   value={s.total.toLocaleString()} sub={`${runs.length} run(s)`}  color="blue"   icon={<Ic.Report />} />
        <KPI label="Passed"        value={s.passed.toLocaleString()} sub={`${s.successRate.toFixed(1)}% rate`} color="green"  icon={<Ic.Check />} />
        <KPI label="Failed"        value={s.failed.toLocaleString()} sub={s.failed > 0 ? 'Needs attention' : 'All clear'} color="red"    icon={<Ic.Warning />} />
        <KPI label="Skipped"       value={s.skipped.toLocaleString()} color="amber"  icon={<Ic.Info />} />
        <KPI label="Aborted"       value={s.aborted.toLocaleString()} color="purple" icon={<Ic.X />} />
      </div>

      {/* Secondary KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KPI label="Avg Duration"  value={fmtDur(s.avgDur)}        color="blue"  />
        <KPI label="Total Retries" value={s.totalRetries}          color="amber" />
        <KPI label="Auth Failures (401)" value={allTests.filter(t => t.httpCode === 401).length} color="red" />
        <KPI label="Domains Tested" value={domainRows.length}      color="slate" />
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <Card className="p-5 relative">
          <h3 className="font-bold text-sm mb-3">Overall Status</h3>
          <ChartBox title="Overall Status" type="doughnut" data={pieData} height={210}
            options={{ plugins: { legend: { position:'bottom', labels: { boxWidth:10, font:{size:11} } } }, cutout: '65%' }} />
          <div className="text-center mt-3">
            <p className="text-3xl font-black">{s.successRate.toFixed(1)}%</p>
            <p className="text-xs text-slate-400 font-semibold">pass rate</p>
          </div>
        </Card>
        <Card className="p-5 lg:col-span-2 relative">
          <h3 className="font-bold text-sm mb-3">Domain Breakdown</h3>
          <ChartBox title="Domain Breakdown" type="bar" data={domainBarData} height={260} options={barOpts} />
        </Card>
      </div>

      {/* Per-run comparison (only if > 1 run) */}
      {runs.length > 1 && (
        <Card className="p-5 relative">
          <h3 className="font-bold text-sm mb-3">Pipeline Run Comparison</h3>
          <ChartBox title="Pipeline Run Comparison" type="bar" data={runBarData} height={200} options={barOpts} />
        </Card>
      )}

      {/* Management domain table */}
      <DomainTable rows={domainRows} subtitle={runs.map(r => r.pipelineName || r.fileName).join(' · ')} />

      {/* Bottom insight cards */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        <Card className="p-5">
          <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Top Failing Domains</h4>
          {domainRows.filter(r => r.MSG.failed + r.UI.failed > 0).slice(0, 5).map(r => (
            <div key={r.domain} className="flex justify-between items-center py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
              <span className="text-sm font-medium">{r.domain}</span>
              <span className="text-red-500 font-bold text-sm">{r.MSG.failed + r.UI.failed} failed</span>
            </div>
          ))}
          {domainRows.every(r => r.MSG.failed + r.UI.failed === 0) && (
            <p className="text-sm text-emerald-500 font-semibold">🎉 Zero failures!</p>
          )}
        </Card>
        <Card className="p-5">
          <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Slowest Test Cases</h4>
          {[...allTests].filter(t => t.duration > 0).sort((a, b) => b.duration - a.duration).slice(0, 5).map(t => (
            <div key={t.id} className="flex justify-between items-center py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
              <span className="text-sm truncate max-w-[150px]" title={t.name}>{t.name}</span>
              <span className="text-amber-600 font-bold text-xs mono ml-2 flex-shrink-0">{fmtDur(t.duration)}</span>
            </div>
          ))}
          {allTests.every(t => !t.duration) && <p className="text-sm text-slate-400">No duration data</p>}
        </Card>
        <Card className="p-5">
          <h4 className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Most Retried</h4>
          {[...allTests].filter(t => t.retries > 0).sort((a, b) => b.retries - a.retries).slice(0, 5).map(t => (
            <div key={t.id} className="flex justify-between items-center py-1.5 border-b border-slate-100 dark:border-slate-700 last:border-0">
              <span className="text-sm truncate max-w-[150px]" title={t.name}>{t.name}</span>
              <span className="text-amber-500 font-bold text-xs ml-2 flex-shrink-0">{t.retries}× retry</span>
            </div>
          ))}
          {allTests.every(t => !t.retries) && <p className="text-sm text-slate-400">No retries detected</p>}
        </Card>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   DOMAIN DETAIL VIEW
═══════════════════════════════════════════════════════════════════════════ */
const DomainView = ({ runs }) => {
  const allTests   = runs.flatMap(r => r.tests);
  const domainRows = buildDomainReport(allTests);
  const [selected, setSelected] = useState(null);
  const [filter, setFilter]     = useState('ALL');
  const [search, setSearch]     = useState('');

  const domainTests = useMemo(() =>
    !selected ? [] : allTests.filter(t =>
      t.domain === selected &&
      (filter === 'ALL' || t.status === filter) &&
      (!search || t.name.toLowerCase().includes(search.toLowerCase()))
    ),
    [selected, filter, search, allTests]
  );

  const dStats = useMemo(() => selected ? buildStats(allTests.filter(t => t.domain === selected)) : null, [selected, allTests]);

  return (
    <div className="fade-in space-y-5">
      <div>
        <h2 className="text-2xl font-black">Domain Report</h2>
        <p className="text-slate-500 dark:text-slate-400 mt-1 text-sm">Management summary table + drill-down by domain.</p>
      </div>

      {/* Management table — Full version with Skipped/Aborted columns */}
      <DomainTableFull rows={domainRows} subtitle={runs.map(r => r.pipelineName || r.fileName).join(' · ')} />

      {/* Domain chip selector */}
      <Card className="p-4">
        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Select a domain to drill down</p>
        <div className="flex flex-wrap gap-2">
          {domainRows.map(r => {
            const tot  = r.MSG.total + r.UI.total;
            const fail = r.MSG.failed + r.UI.failed;
            const sel  = selected === r.domain;
            return (
              <button
                key={r.domain}
                onClick={() => { setSelected(sel ? null : r.domain); setFilter('ALL'); setSearch(''); }}
                className={`px-3.5 py-2 rounded-xl border text-sm font-bold transition-all
                  ${sel ? 'bg-brand-600 text-white border-brand-600 shadow-md' : 'border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:border-brand-400'}`}
              >
                {r.domain}
                <span className={`ml-2 text-xs ${sel ? 'opacity-80' : 'text-slate-400'}`}>{tot}</span>
                {fail > 0 && <span className={`ml-1 text-xs ${sel ? 'text-red-200' : 'text-red-500'}`}>· {fail}✗</span>}
              </button>
            );
          })}
        </div>
      </Card>

      {/* Drill-down table */}
      {selected && dStats && (
        <Card className="overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-200 dark:border-slate-700">
            <div className="flex flex-wrap items-center justify-between gap-3">
              <div>
                <h3 className="font-bold text-base">{selected} — Test Cases</h3>
                <div className="flex gap-3 mt-1 text-xs font-semibold flex-wrap">
                  <span className="text-emerald-600">✓ {dStats.passed} passed</span>
                  <span className="text-red-500">✗ {dStats.failed} failed</span>
                  {dStats.skipped > 0 && <span className="text-amber-500">⊘ {dStats.skipped} skipped</span>}
                  {dStats.aborted > 0 && <span className="text-slate-400">⊡ {dStats.aborted} aborted</span>}
                </div>
              </div>
              <RateBar rate={dStats.successRate} />
            </div>
          </div>

          <div className="px-5 py-3 flex flex-wrap gap-3 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-700">
            <div className="flex-1 min-w-[200px]"><SearchInput value={search} onChange={setSearch} placeholder="Search test cases…" /></div>
            <FilterBtns
              options={['ALL','PASSED','FAILED','SKIPPED','ABORTED']}
              active={filter}
              onChange={setFilter}
              counts={{ ALL: dStats.total, PASSED: dStats.passed, FAILED: dStats.failed, SKIPPED: dStats.skipped, ABORTED: dStats.aborted }}
            />
          </div>

          <div className="overflow-x-auto max-h-[600px] overflow-y-auto">
            <table className="w-full">
              <TCTableHeader />
              <tbody>
                {domainTests.length === 0
                  ? <tr><td colSpan={9} className="text-center py-10 text-slate-400 text-sm">No test cases match</td></tr>
                  : domainTests.map((t, i) => <TCRow key={t.id} t={t} idx={i} />)
                }
              </tbody>
            </table>
          </div>

          <div className="px-5 py-2.5 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/60 text-xs text-slate-500">
            Showing <strong>{domainTests.length}</strong> / <strong>{dStats.total}</strong> test cases in <strong>{selected}</strong>
          </div>
        </Card>
      )}
    </div>
  );
};

        <div className="space-y-3 max-h-[640px] overflow-y-auto pr-1">
          {sorted.map((t, i) => (
            <div key={t.id} className="flex items-start gap-4 pl-4 relative">
              <div className="absolute left-0 top-0 bottom-0 w-px bg-gradient-to-b from-brand-400 to-violet-400 opacity-25" />
              <div className={`w-3 h-3 rounded-full flex-shrink-0 mt-1.5 -ml-1.5 ring-2 ring-white dark:ring-slate-800

                  <p className="text-xs text-red-500 mt-2 line-clamp-2">{t.errorMessage}</p>

            </div>
          ))}
        </div>
      </Card>
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   EXPORT / REPORTS VIEW
═══════════════════════════════════════════════════════════════════════════ */
const ReportsView = ({ runs }) => {
  const allTests   = runs.flatMap(r => r.tests);
  const s          = buildStats(allTests);
  const domainRows = buildDomainReport(allTests);
  const [status, setStatus] = useState('');
  const [pdfDateTime, setPdfDateTime] = useState('');  // optional override date/time for PDF cover

  const exportExcel = () => {
    setStatus('Generating Excel…');
    try {
      const wb = XLSX.utils.book_new();

      // Sheet 1 — Summary
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ['TA Execution — Management Report'],[''],
        ['Generated', pdfDateTime.trim() ? pdfDateTime.trim() : new Date().toLocaleString()],
        ['Pipeline Runs', runs.length],[''],
        ['Metric','Value'],
        ['Total Tests', s.total],['Passed', s.passed],['Failed', s.failed],
        ['Skipped', s.skipped],['Aborted', s.aborted],
        ['Pass Rate', `${s.successRate.toFixed(2)}%`],
        ['Avg Duration', fmtDur(s.avgDur)],
        ['Total Retries', s.totalRetries],
      ]), 'Summary');

      // Sheet 2 — Domain Table
      const dh = ['Domain','Msg Exec','UI Exec','Msg Pass','UI Pass','Msg Fail','UI Fail','Pass Rate'];
      const db = domainRows.map(r => {
        const msgEx = r.MSG.total - r.MSG.skipped;
        const uiEx  = r.UI.total  - r.UI.skipped;
        const ex    = msgEx + uiEx;
        const pa    = r.MSG.passed + r.UI.passed;
        const rate  = ex ? (pa / ex * 100).toFixed(1) + '%' : '100.0%';
        return [r.domain, msgEx, uiEx, r.MSG.passed, r.UI.passed, r.MSG.failed, r.UI.failed, rate];
      });
      const msgExTotal = domainRows.reduce((a,r)=>a+(r.MSG.total-r.MSG.skipped),0);
      const uiExTotal  = domainRows.reduce((a,r)=>a+(r.UI.total-r.UI.skipped),0);
      const grandEx    = msgExTotal + uiExTotal;
      const grandPa    = domainRows.reduce((a,r)=>a+r.MSG.passed,0) + domainRows.reduce((a,r)=>a+r.UI.passed,0);
      const grandFa    = domainRows.reduce((a,r)=>a+r.MSG.failed,0) + domainRows.reduce((a,r)=>a+r.UI.failed,0);
      const grandRate  = grandEx ? (grandPa / grandEx * 100).toFixed(1) + '%' : '100.0%';
      const subR  = ['Sub-Total',
        msgExTotal, uiExTotal,
        domainRows.reduce((a,r)=>a+r.MSG.passed,0), domainRows.reduce((a,r)=>a+r.UI.passed,0),
        domainRows.reduce((a,r)=>a+r.MSG.failed,0), domainRows.reduce((a,r)=>a+r.UI.failed,0), grandRate];
      const grandR = ['Grand Total', grandEx, '', grandPa, '', grandFa, '', grandRate];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([dh, ...db, subR, grandR]), 'Domain Report');

      // Sheet 3 — All Tests
      const tcH = ['Pipeline Run','Test Case','Domain','Type','Status','Duration','Retries','HTTP Code','Error'];
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tcH,
        ...allTests.map(t => [t.source||'', t.name, t.domain, t.type, t.status, fmtDur(t.duration), t.retries, t.httpCode||'', t.errorMessage||''])
      ]), 'All Test Cases');

      // Sheet 4 — Failed Only
      const failed = allTests.filter(t => t.status === 'FAILED');
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tcH,
        ...failed.map(t => [t.source||'', t.name, t.domain, t.type, t.status, fmtDur(t.duration), t.retries, t.httpCode||'', t.errorMessage||''])
      ]), 'Failed Tests');

      // Sheet 5 — Skipped/Aborted
      const nonRun = allTests.filter(t => ['SKIPPED','ABORTED'].includes(t.status));
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([tcH,
        ...nonRun.map(t => [t.source||'', t.name, t.domain, t.type, t.status, fmtDur(t.duration), t.retries, t.httpCode||'', t.errorMessage||''])
      ]), 'Skipped & Aborted');

      // Per-run sheets
      runs.forEach((run, ri) => {
        const rs = buildStats(run.tests);
        const sheet = XLSX.utils.aoa_to_sheet([
          ['Run Name', run.pipelineName || run.fileName],
          ['Total', rs.total], ['Passed', rs.passed], ['Failed', rs.failed], ['Pass Rate', `${rs.successRate.toFixed(2)}%`], [''],
          ['Test Case','Domain','Type','Status','Duration','Retries','HTTP','Error'],
          ...run.tests.map(t => [t.name, t.domain, t.type, t.status, fmtDur(t.duration), t.retries, t.httpCode||'', t.errorMessage||''])
        ]);
        XLSX.utils.book_append_sheet(wb, sheet, `Run_${ri+1}`.substring(0, 31));
      });

      XLSX.writeFile(wb, `TA_PIPELINE_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
      setStatus('✓ Excel downloaded!');
    } catch (e) { setStatus(`Error: ${e.message}`); }
    setTimeout(() => setStatus(''), 4000);
  };

  const exportPDF = () => {
    setStatus('Generating PDF…');
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();

      // Use user-supplied date/time if provided, else current export time
      const coverDateTime = pdfDateTime.trim()
        ? pdfDateTime.trim()
        : new Date().toLocaleString();

      // Executed = total − skipped (used consistently across cover + all pages)
      const covExec     = s.total - s.skipped;
      const covRate     = covExec ? (s.passed / covExec * 100).toFixed(2) : '100.00';

      // ── Cover ──
      doc.setFillColor(15, 23, 42); doc.rect(0, 0, W, H, 'F');
      doc.setFillColor(14, 165, 233); doc.rect(0, 0, 8, H, 'F');
      doc.setTextColor(14, 165, 233); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text('TA Execution  Pipeline Report Generator', 16, 18);
      doc.setTextColor(255, 255, 255); doc.setFontSize(28);
      doc.text('Execution Report', 16, 38);
      doc.setTextColor(148, 163, 184); doc.setFontSize(11); doc.setFont('helvetica','normal');
      doc.text(`Generated: ${coverDateTime}`, 16, 50);
      doc.text(`Pipeline Runs: ${runs.length}  ·  Executed: ${covExec}  ·  Pass Rate: ${covRate}%`, 16, 59);

      // KPI boxes on cover — 4 boxes only (no SKIPPED)
      [['EXECUTED',covExec,'#3b82f6'],['PASSED',s.passed,'#10b981'],['FAILED',s.failed,'#ef4444'],['ABORTED',s.aborted,'#8b5cf6']].forEach(([lbl,val,hex],i) => {
        const x = 16 + i * 68;
        doc.setFillColor(30, 41, 59); doc.roundedRect(x, 75, 62, 24, 2, 2, 'F');
        const [r,g,b] = hex.match(/\w\w/g).map(c => parseInt(c, 16));
        doc.setTextColor(r,g,b); doc.setFontSize(18); doc.setFont('helvetica','bold');
        doc.text(String(val), x + 31, 90, { align: 'center' });
        doc.setTextColor(148,163,184); doc.setFontSize(7); doc.setFont('helvetica','normal');
        doc.text(lbl, x + 31, 97, { align: 'center' });
      });

      // ── Page 2: Domain Table (executed = total − skipped, matching Dashboard) ──
      doc.addPage();
      doc.setFillColor(248, 250, 252); doc.rect(0, 0, W, H, 'F');
      doc.setFillColor(15, 23, 42); doc.rect(0, 0, W, 12, 'F');
      doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.text('TA Execution |  DOMAIN-WISE SUMMARY', 10, 8);
      doc.setTextColor(15,23,42); doc.setFontSize(15); doc.text('Management Summary Report', 14, 24);

      const pdfMsgExTotal = domainRows.reduce((a,r)=>a+(r.MSG.total-r.MSG.skipped),0);
      const pdfUiExTotal  = domainRows.reduce((a,r)=>a+(r.UI.total-r.UI.skipped),0);
      const pdfGrandEx    = pdfMsgExTotal + pdfUiExTotal;
      const pdfGrandPa    = domainRows.reduce((a,r)=>a+r.MSG.passed+r.UI.passed,0);
      const pdfGrandFa    = domainRows.reduce((a,r)=>a+r.MSG.failed+r.UI.failed,0);
      const pdfGrandRate  = pdfGrandEx ? `${(pdfGrandPa/pdfGrandEx*100).toFixed(1)}%` : '100.0%';

      doc.autoTable({
        startY: 28,
        head: [['Domain / Module','Msg Exec','UI Exec','Msg Pass','UI Pass','Msg Fail','UI Fail','Pass Rate']],
        body: domainRows.map(r => {
          const msgEx = r.MSG.total - r.MSG.skipped;
          const uiEx  = r.UI.total  - r.UI.skipped;
          const ex = msgEx + uiEx, pa = r.MSG.passed + r.UI.passed;
          return [r.domain, msgEx, uiEx, r.MSG.passed, r.UI.passed, r.MSG.failed, r.UI.failed,
            ex ? `${(pa/ex*100).toFixed(1)}%` : '100%'];
        }),
        foot: [
          ['Sub-Total', pdfMsgExTotal, pdfUiExTotal,
           domainRows.reduce((a,r)=>a+r.MSG.passed,0), domainRows.reduce((a,r)=>a+r.UI.passed,0),
           domainRows.reduce((a,r)=>a+r.MSG.failed,0), domainRows.reduce((a,r)=>a+r.UI.failed,0), pdfGrandRate],
          ['Grand Total', pdfGrandEx, '', pdfGrandPa, '', pdfGrandFa, '', pdfGrandRate],
        ],
        theme: 'striped',
        headStyles: { fillColor:[15,23,42], textColor:[255,255,255], fontSize:8, fontStyle:'bold' },
        bodyStyles: { fontSize: 8 },
        footStyles: [
          { fillColor:[30,41,59], textColor:[255,255,255], fontStyle:'bold', fontSize:8 },
          { fillColor:[190,18,60], textColor:[255,255,255], fontStyle:'bold', fontSize:9 },
        ],
        margin: { left:14, right:14 },
      });

      // ── Page 3: Per-Run Summary ──
      doc.addPage();
      doc.setFillColor(248,250,252); doc.rect(0,0,W,H,'F');
      doc.setFillColor(15,23,42); doc.rect(0,0,W,12,'F');
      doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
      doc.text('TA Execution |  PIPELINE RUN SUMMARY', 10, 8);
      doc.setTextColor(15,23,42); doc.setFontSize(15); doc.text('Pipeline Run Summary', 14, 24);
      doc.autoTable({
        startY: 28,
        head: [['Pipeline Run','Executed','Passed','Failed','Aborted','Pass Rate']],
        body: runs.map(r => {
          const rs   = buildStats(r.tests);
          const exec = rs.total - rs.skipped;
          const rate = exec ? (rs.passed / exec * 100).toFixed(1) : '100.0';
          return [r.pipelineName||r.fileName, exec, rs.passed, rs.failed, rs.aborted, `${rate}%`];
        }),
        theme: 'striped',
        headStyles: { fillColor:[15,23,42], textColor:[255,255,255], fontSize:8 },
        bodyStyles: { fontSize: 8 },
        margin: { left:14, right:14 },
      });

      // ── Page 4: Failed Tests ──
      const failedTests = allTests.filter(t => t.status === 'FAILED');
      if (failedTests.length > 0) {
        doc.addPage();
        doc.setFillColor(248,250,252); doc.rect(0,0,W,H,'F');
        doc.setFillColor(220,38,38); doc.rect(0,0,W,12,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
        doc.text('TA Execution | FAILED TEST CASES', 10, 8);
        doc.setTextColor(15,23,42); doc.setFontSize(15); doc.text(`Failed Test Cases (${failedTests.length})`, 14, 24);
        doc.autoTable({
          startY: 28,
          head: [['Test Case','Domain','Type','Pipeline Run','HTTP','Error Message']],
          body: failedTests.slice(0,200).map(t => [
            t.name.substring(0,38), t.domain, t.type, (t.source||'').substring(0,25),
            t.httpCode || '—', (t.errorMessage||'').substring(0,55),
          ]),
          theme: 'striped',
          headStyles: { fillColor:[220,38,38], textColor:[255,255,255], fontSize:8 },
          bodyStyles: { fontSize: 7 },
          columnStyles: { 5: { cellWidth: 'auto' } },
          margin: { left:14, right:14 },
        });
      }

      // ── Footer on all pages ──
      const total = doc.internal.getNumberOfPages();
      for (let i = 1; i <= total; i++) {
        doc.setPage(i);
        doc.setFontSize(7); doc.setTextColor(150,150,150);
        doc.text(`Page ${i} of ${total}  ·  ${coverDateTime}`,
          W/2, H-5, { align: 'center' });
      }

      doc.save(`TA_PIPELINE_Report_${new Date().toISOString().slice(0,10)}.pdf`);
      setStatus('✓ PDF downloaded!');
    } catch (e) { setStatus(`Error: ${e.message}`); }
    setTimeout(() => setStatus(''), 4000);
  };

  return (
    <div className="fade-in space-y-6">
      <div>
        <h2 className="text-2xl font-black">Export Reports</h2>
        <p className="text-slate-500 dark:text-slate-400 mt-1 text-sm">Download professional management reports with domain tables, per-run breakdown, and failed test details.</p>
      </div>

      {status && (
        <div className="flex items-center gap-3 p-4 rounded-xl bg-brand-50 dark:bg-brand-900/20 border border-brand-200 dark:border-brand-800 text-brand-700 dark:text-brand-300 text-sm font-medium">
          <Ic.Info />{status}
        </div>
      )}

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <Card className="p-6">
          <div className="w-12 h-12 rounded-2xl bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center mb-4">
            <Ic.Download />
          </div>
          <h3 className="font-bold mb-1">Excel Report (.xlsx)</h3>
          <p className="text-sm text-slate-500 mb-1">6 sheets:</p>
          <ul className="text-xs text-slate-400 space-y-0.5 mb-5 list-disc list-inside">
            <li>Summary KPIs</li>
            <li>Domain Report (management table)</li>
            <li>All Test Cases</li>
            <li>Failed Tests only</li>
            <li>Skipped & Aborted</li>
            <li>One sheet per pipeline run</li>
          </ul>
          <Btn onClick={exportExcel} variant="success" className="w-full justify-center"><Ic.Download />Download Excel</Btn>
        </Card>

        <Card className="p-6">
          <div className="w-12 h-12 rounded-2xl bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 flex items-center justify-center mb-4">
            <Ic.Download />
          </div>
          <h3 className="font-bold mb-1">PDF Report (.pdf)</h3>
          <p className="text-sm text-slate-500 mb-1">4 pages:</p>
          <ul className="text-xs text-slate-400 space-y-0.5 mb-4 list-disc list-inside">
            <li>Cover page with KPI boxes</li>
            <li>Domain-wise management table</li>
            <li>Pipeline run comparison</li>
            <li>Failed test cases (up to 200)</li>
          </ul>
          {/* Optional date/time override for PDF cover */}
          <div className="mb-4">
            <label className="block text-xs font-semibold text-slate-500 mb-1">
              Cover Date &amp; Time <span className="font-normal text-slate-400">(optional — leave blank to use export time)</span>
            </label>
            <input
              type="text"
              value={pdfDateTime}
              onChange={e => setPdfDateTime(e.target.value)}
              placeholder={`e.g. ${new Date().toLocaleString()}`}
              className="w-full text-sm px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-brand-400"
            />
          </div>
          <Btn onClick={exportPDF} variant="danger" className="w-full justify-center"><Ic.Download />Download PDF</Btn>
        </Card>
      </div>

      {/* Live preview */}
      <DomainTable rows={domainRows} title="Report Preview — Domain Table" subtitle={runs.map(r => r.pipelineName || r.fileName).join(' · ')} />
    </div>
  );
};

/* ════════════════════════════════════════════════════════════════════════
   HISTORY VIEW
═══════════════════════════════════════════════════════════════════════════ */
const HistoryView = ({ sessions, onLoad, onDelete }) => (
  <div className="fade-in space-y-5">
    <div>
      <h2 className="text-2xl font-black">Session History</h2>
      <p className="text-slate-500 dark:text-slate-400 mt-1 text-sm">Up to 20 sessions saved in browser storage. Load any session to continue analysis.</p>
    </div>
    {sessions.length === 0 && (
      <Card className="p-14 text-center">
        <p className="text-3xl mb-3">📂</p>
        <p className="font-semibold text-slate-500">No sessions saved yet</p>
        <p className="text-sm text-slate-400 mt-1">Upload and analyse files to see them here</p>
      </Card>
    )}
    <div className="space-y-3">
      {sessions.map((session, i) => {
        const allTests = session.runs.flatMap(r => r.tests);
        const st = buildStats(allTests);
        return (
          <Card key={i} className="p-4 flex items-center gap-4" hover>
            <div className={`w-1 h-12 rounded-full flex-shrink-0 ${st.successRate>=95?'bg-emerald-500':st.successRate>=75?'bg-amber-400':'bg-red-500'}`} />
            <div className="flex-1 min-w-0">
              <p className="font-bold truncate">{session.label || session.runs[0]?.pipelineName || 'Session'}</p>
              <p className="text-xs text-slate-500 mt-0.5">
                {new Date(session.savedAt).toLocaleString()} · {st.total} tests · {session.runs.length} run(s)
              </p>
            </div>
            <span className={`pill flex-shrink-0 ${st.successRate>=95?'pill-pass':st.successRate>=75?'pill-skip':'pill-fail'}`}>
              {st.successRate.toFixed(1)}%
            </span>
            <Btn onClick={() => onLoad(session)} variant="outline" size="sm">
              <Ic.Eye />Load
            </Btn>
            <button onClick={() => onDelete(i)} className="text-slate-400 hover:text-red-500 transition-colors p-1 flex-shrink-0">
              <Ic.Trash />
            </button>
          </Card>
        );
      })}
    </div>
  </div>
);

/* ════════════════════════════════════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════════════════════════════════════ */
const NAV = [
  { id: 'upload',    label: 'Upload',         icon: <Ic.Upload />,   always: true  },
  { id: 'dashboard', label: 'Dashboard',       icon: <Ic.Dashboard />,needs: true  },
  { id: 'pipeline',  label: 'Pipeline Runs',   icon: <Ic.Pipeline />, needs: true  },
  { id: 'domain',    label: 'Domain Report',   icon: <Ic.Domain />,   needs: true  },
  { id: 'timeline',  label: 'Timeline',        icon: <Ic.Timeline />, needs: true  },
  { id: 'reports',   label: 'Export Reports',  icon: <Ic.Report />,   needs: true  },
  { id: 'history',   label: 'History',         icon: <Ic.History />,  always: true },
];

const App = () => {
  const [dark,     setDark]     = useState(() => window.matchMedia('(prefers-color-scheme:dark)').matches);
  const [sidebar,  setSidebar]  = useState(true);
  const [view,     setView]     = useState('upload');
  const [runs,     setRuns]     = useState([]);
  const [sessions, setSessions] = useState(() => {
    try { return JSON.parse(localStorage.getItem('qa-portal-v3') || '[]'); } catch { return []; }
  });

  useEffect(() => { document.documentElement.classList.toggle('dark', dark); }, [dark]);
  useEffect(() => {
    try { localStorage.setItem('qa-portal-v3', JSON.stringify(sessions.slice(0, 20))); } catch {}
  }, [sessions]);

  const onProcessed = (newRuns, label) => {
    setRuns(newRuns);
    setView('dashboard');
    setSessions(prev => [{
      label: label || newRuns[0]?.pipelineName || `Session ${new Date().toLocaleString()}`,
      savedAt: new Date().toISOString(),
      runs: newRuns,
    }, ...prev].slice(0, 20));
  };

  const loadSession  = s  => { setRuns(s.runs); setView('dashboard'); };
  const deleteSession = i => setSessions(prev => prev.filter((_, j) => j !== i));

  const hasData = runs.length > 0;
  const allTests = runs.flatMap(r => r.tests);

  const navigate = (id) => {
    const item = NAV.find(n => n.id === id);
    if (item?.needs && !hasData) return;
    setView(id);
    if (window.innerWidth < 1024) setSidebar(false);
  };

  const renderView = () => {
    if (!hasData && NAV.find(n => n.id === view)?.needs) return (
      <div className="flex flex-col items-center justify-center min-h-[50vh] text-center fade-in">
        <div className="text-6xl mb-5">📂</div>
        <h3 className="text-xl font-bold mb-2">No data loaded</h3>
        <p className="text-slate-500 text-sm mb-6 max-w-xs">Upload execution logs or load a previous session to get started.</p>
        <div className="flex gap-3">
          <Btn onClick={() => setView('upload')} size="lg"><Ic.Upload />Upload Files</Btn>
          <Btn onClick={() => setView('history')} variant="outline" size="lg"><Ic.History />History</Btn>
        </div>
      </div>
    );

    switch (view) {
      case 'upload':    return <UploadView onProcessed={onProcessed} />;
      case 'dashboard': return <DashboardView runs={runs} />;
      case 'pipeline':  return <PipelineRunsView runs={runs} />;
      case 'domain':    return <DomainView runs={runs} />;
      case 'timeline':  return <TimelineView runs={runs} />;
      case 'reports':   return <ReportsView runs={runs} />;
      case 'history':   return <HistoryView sessions={sessions} onLoad={loadSession} onDelete={deleteSession} />;
      default:          return <UploadView onProcessed={onProcessed} />;
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 dark:bg-slate-900">

      {/* ── Header ── */}
      <header className="fixed top-0 left-0 right-0 z-50 h-14 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 flex items-center px-4 gap-4">
        <button onClick={() => setSidebar(v => !v)}
          className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors">
          <Ic.Menu />
        </button>

        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-brand-400 to-brand-700 flex items-center justify-center text-white shadow-sm">
            <Ic.Zap />
          </div>
          <div className="leading-tight">
            <span className="font-black text-sm tracking-tight">TA Execution</span>
            <span className="text-xs text-slate-400 ml-1.5 hidden sm:inline font-medium">Pipeline Report Generator</span>
          </div>
        </div>

        {hasData && (
          <div className="flex items-center gap-2 ml-1 bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 rounded-full px-3 py-1">
            <div className="live-dot" />
            <span className="text-xs font-bold text-emerald-700 dark:text-emerald-400">
              {allTests.length.toLocaleString()} tests · {runs.length} run{runs.length !== 1 ? 's' : ''}
            </span>
          </div>
        )}

        <div className="ml-auto flex items-center gap-2">
          {hasData && (
            <Btn onClick={() => { setRuns([]); setView('upload'); }} variant="ghost" size="sm">
              <Ic.Upload />New Upload
            </Btn>
          )}
          <button
            onClick={() => setDark(v => !v)}
            className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition-colors"
          >
            {dark ? <Ic.Sun /> : <Ic.Moon />}
          </button>
        </div>
      </header>

      {/* ── Sidebar ── */}
      <aside className={`fixed inset-y-0 left-0 z-40 w-56 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col transition-transform duration-300
        ${sidebar ? 'translate-x-0' : '-translate-x-full'}`}>
        <div className="h-14 flex-shrink-0" /> {/* header offset */}
        <nav className="flex-1 overflow-y-auto p-2.5 space-y-0.5">
          {NAV.map(item => {
            const disabled = !!(item.needs && !hasData);
            const active   = view === item.id;
            return (
              <button
                key={item.id}
                onClick={() => navigate(item.id)}
                disabled={disabled}
                className={`nav-link w-full flex items-center gap-3 px-3.5 py-2.5 rounded-xl text-sm font-semibold transition-all
                  ${active   ? 'active' : ''}
                  ${disabled ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white'}`}
              >
                {item.icon}
                <span>{item.label}</span>
                {item.id === 'pipeline' && hasData && (
                  <span className="ml-auto text-xs bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 px-1.5 py-0.5 rounded-full font-bold">{runs.length}</span>
                )}
              </button>
            );
          })}
        </nav>
        <div className="p-3 border-t border-slate-200 dark:border-slate-700">
          <p className="text-xs text-slate-400 text-center font-medium">TA Execution-Pipeline Report Generator</p>
          <p className="text-[10px] text-slate-300 dark:text-slate-600 text-center mt-0.5">Developed by: yashwant.c.singh</p>
        </div>
      </aside>

      {/* ── Mobile overlay ── */}
      {sidebar && (
        <div className="fixed inset-0 bg-black/40 z-30 lg:hidden" onClick={() => setSidebar(false)} />
      )}

      {/* ── Main content ── */}
      <main className={`pt-14 transition-all duration-300 ${sidebar ? 'lg:ml-56' : ''}`}>
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-7 pb-16">
          {renderView()}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
